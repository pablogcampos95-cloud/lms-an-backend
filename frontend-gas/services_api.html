<script>
const API_URL = 'https://lms-an-backend-production.up.railway.app';

const ApiService = {
  sessionExpiredNotified: false,

  getToken() {
    return localStorage.getItem('an_academy_token');
  },

  setSession(token, usuario) {
    localStorage.setItem('an_academy_token', token);
    localStorage.setItem('an_academy_usuario', JSON.stringify(usuario));
    this.sessionExpiredNotified = false;
  },

  getSessionUser() {
    const raw = localStorage.getItem('an_academy_usuario');
    return raw ? JSON.parse(raw) : null;
  },

  clearSession() {
    localStorage.removeItem('an_academy_token');
    localStorage.removeItem('an_academy_usuario');
  },

  async request(path, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    };

    const token = this.getToken();
    if (token) {
      headers.Authorization = `Bearer ${token}`;
    }

    const response = await fetch(`${API_URL}${path}`, {
      ...options,
      headers,
    });

    const payload = await response.json().catch(() => ({}));

    if (!response.ok) {
      const error = new Error(payload.message || 'Error al conectar con la API');
      error.status = response.status;
      error.payload = payload;

      if (response.status === 401 && path !== '/api/auth/login' && token) {
        this.clearSession();
        if (!this.sessionExpiredNotified) {
          this.sessionExpiredNotified = true;
          window.dispatchEvent(new CustomEvent('auth:expired', { detail: { message: error.message } }));
        }
      }

      throw error;
    }

    return payload;
  },

  async upload(path, formData) {
    const headers = {};
    const token = this.getToken();
    if (token) headers.Authorization = `Bearer ${token}`;
    const response = await fetch(`${API_URL}${path}`, { method: 'POST', headers, body: formData });
    const payload = await response.json().catch(() => ({}));
    if (!response.ok) {
      const error = new Error(payload.message || 'No se pudo subir el archivo');
      error.status = response.status;
      if (response.status === 401 && token) {
        this.clearSession();
        if (!this.sessionExpiredNotified) {
          this.sessionExpiredNotified = true;
          window.dispatchEvent(new CustomEvent('auth:expired', { detail: { message: error.message } }));
        }
      }
      throw error;
    }
    return payload;
  },
};
</script>
