<script>
const AppState = {
  usuario: null,
  usuarios: [],
  roles: [],
  chart: null,
  userModal: null,
  cursos: [],
  cursoActual: null,
  courseModal: null,
  moduleModal: null,
  lessonModal: null,
  coursePreviewModal: null,
  studentLessons: [],
  studentLessonIndex: 0,
  dashboardData: null,
};

const MENUS = {
  Administrador: [
    ['dashboard', 'fa-chart-line', 'Dashboard'],
    ['usuarios', 'fa-users', 'Usuarios'],
    ['cursos', 'fa-sitemap', 'Administracion LMS'],
    ['evaluaciones', 'fa-clipboard-check', 'Evaluaciones'],
    ['certificados', 'fa-award', 'Certificados'],
    ['reportes', 'fa-file-lines', 'Reportes'],
    ['configuracion', 'fa-gear', 'Configuracion'],
  ],
  Analista: [
    ['dashboard', 'fa-chart-line', 'Dashboard'],
    ['usuarios', 'fa-users', 'Usuarios'],
    ['reportes', 'fa-file-lines', 'Reportes'],
    ['calidad', 'fa-shield-halved', 'Calidad'],
    ['retencion', 'fa-user-check', 'Retencion'],
  ],
  Instructor: [
    ['dashboard', 'fa-chart-line', 'Dashboard'],
    ['cursos', 'fa-graduation-cap', 'Cursos'],
    ['modulos', 'fa-layer-group', 'Modulos'],
    ['lecciones', 'fa-circle-play', 'Lecciones'],
    ['evaluaciones', 'fa-clipboard-check', 'Evaluaciones'],
    ['avance', 'fa-bars-progress', 'Avance estudiantes'],
  ],
  Estudiante: [
    ['dashboard', 'fa-chart-line', 'Inicio'],
    ['cursos', 'fa-graduation-cap', 'Mis cursos'],
    ['evaluaciones', 'fa-clipboard-check', 'Mis evaluaciones'],
    ['certificados', 'fa-award', 'Mis certificados'],
  ],
};

document.addEventListener('DOMContentLoaded', () => {
  AppState.userModal = new bootstrap.Modal(document.getElementById('userModal'));
  AppState.courseModal = new bootstrap.Modal(document.getElementById('courseModal'));
  AppState.moduleModal = new bootstrap.Modal(document.getElementById('moduleModal'));
  AppState.lessonModal = new bootstrap.Modal(document.getElementById('lessonModal'));
  AppState.coursePreviewModal = new bootstrap.Modal(document.getElementById('coursePreviewModal'));

  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('logoutButton').addEventListener('click', handleLogout);
  document.getElementById('toggleSidebar').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });
  document.getElementById('openUserModal').addEventListener('click', openCreateUserModal);
  document.getElementById('userForm').addEventListener('submit', handleSaveUser);
  document.getElementById('refreshUsers').addEventListener('click', loadUsers);
  document.getElementById('userSearch').addEventListener('input', renderUsersTable);
  document.getElementById('userStatusFilter').addEventListener('change', renderUsersTable);
  document.getElementById('exportUsersCsv').addEventListener('click', exportUsersCsv);
  document.getElementById('exportUsersPdf').addEventListener('click', () => window.print());
  document.getElementById('openCourseModal').addEventListener('click', openCreateCourseModal);
  document.getElementById('courseForm').addEventListener('submit', saveCourse);
  document.getElementById('courseSearch').addEventListener('input', renderCoursesTable);
  document.getElementById('courseStatusFilter').addEventListener('change', renderCoursesTable);
  document.getElementById('courseCategoryFilter').addEventListener('input', renderCoursesTable);
  document.getElementById('backToCourses').addEventListener('click', closeCourseEditor);
  document.getElementById('openModuleModal').addEventListener('click', openCreateModuleModal);
  document.getElementById('moduleForm').addEventListener('submit', saveModule);
  document.getElementById('lessonForm').addEventListener('submit', saveLesson);
  document.getElementById('lessonType').addEventListener('change', renderLessonTypeFields);
  document.getElementById('previewEmbeddedHtml').addEventListener('click', previewEmbeddedHtml);
  document.getElementById('editCurrentCourse').addEventListener('click', () => openEditCourseModal(AppState.cursoActual.id));
  document.getElementById('publishCurrentCourse').addEventListener('click', publishCurrentCourse);
  document.getElementById('previewCourse').addEventListener('click', previewCurrentCourse);

  boot();
});

async function boot() {
  const token = ApiService.getToken();
  if (!token) {
    showLogin();
    return;
  }

  try {
    const usuario = await AuthService.me();
    await startSession(usuario);
  } catch (error) {
    AuthService.logout();
    showLogin();
  }
}

async function handleLogin(event) {
  event.preventDefault();
  const button = document.getElementById('loginButton');
  const usuario = document.getElementById('loginUsuario').value.trim();
  const password = document.getElementById('loginPassword').value;

  button.disabled = true;
  button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando';

  try {
    const sessionUser = await AuthService.login(usuario, password);
    await startSession(sessionUser);
    Swal.fire({ toast: true, position: 'top-end', timer: 2200, showConfirmButton: false, icon: 'success', title: 'Sesion iniciada' });
  } catch (error) {
    Swal.fire('No se pudo iniciar sesion', error.message, 'error');
  } finally {
    button.disabled = false;
    button.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar';
  }
}

async function startSession(usuario) {
  AppState.usuario = usuario;
  document.getElementById('sessionName').textContent = usuario.Nombres || usuario.usuario;
  document.getElementById('sessionRole').textContent = usuario.rol ? usuario.rol.nombre : 'Sin rol';
  document.getElementById('openCourseModal').classList.toggle('d-none', !canManageCourses());
  renderMenu();
  configureRoleInterface();
  showApp();
  renderCurrentPlan();
  showView('dashboard');
  await Promise.allSettled(isStudent() ? [loadDashboard(), loadCourses()] : [loadDashboard(), loadRoles(), loadUsers(), loadCourses()]);
}

function isStudent() {
  return Boolean(AppState.usuario && AppState.usuario.rol && AppState.usuario.rol.nombre === 'Estudiante');
}

function configureRoleInterface() {
  const student = isStudent();
  document.getElementById('createEvaluationButton').classList.toggle('d-none', student);
  document.getElementById('createCertificateButton').classList.toggle('d-none', student);
  document.querySelector('#view-evaluaciones .row').classList.toggle('d-none', student);
  document.querySelector('#view-certificados .row').classList.toggle('d-none', student);
  document.getElementById('openCourseModal').classList.toggle('d-none', !canManageCourses());
  const navButtons = document.querySelectorAll('.main-navigation button');
  navButtons.forEach((button) => {
    const label = button.textContent.trim();
    if (student && label === 'Categorias') button.classList.add('d-none');
    else button.classList.remove('d-none');
  });
  document.querySelectorAll('#view-dashboard .section-heading').forEach((heading) => {
    const demoSection = heading.textContent.includes('DESARROLLA NUEVAS HABILIDADES') || heading.textContent.includes('CRECE PASO A PASO');
    if (demoSection) {
      heading.classList.toggle('d-none', student);
      if (heading.nextElementSibling) heading.nextElementSibling.classList.toggle('d-none', student);
    }
  });
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('d-none');
  document.getElementById('appShell').classList.add('d-none');
}

function showApp() {
  document.getElementById('loginScreen').classList.add('d-none');
  document.getElementById('appShell').classList.remove('d-none');
}

function handleLogout() {
  AuthService.logout();
  AppState.usuario = null;
  showLogin();
}

function renderMenu() {
  const rol = AppState.usuario && AppState.usuario.rol ? AppState.usuario.rol.nombre : 'Estudiante';
  const items = MENUS[rol] || MENUS.Estudiante;
  const nav = document.getElementById('sideNav');

  nav.innerHTML = items.map(([view, icon, label]) => `
    <button class="side-link" type="button" data-view="${view}">
      <i class="fa-solid ${icon}"></i>
      <span class="nav-label">${label}</span>
    </button>
  `).join('');

  nav.querySelectorAll('.side-link').forEach((button) => {
    button.addEventListener('click', () => showView(button.dataset.view));
  });
}

function showView(viewName) {
  let target = document.getElementById(`view-${viewName}`);
  if (!target) {
    target = document.getElementById('view-not-found');
    document.getElementById('missingViewMessage').textContent = `La seccion "${viewName}" todavia no tiene una pantalla configurada.`;
  }
  document.querySelectorAll('.view').forEach((view) => view.classList.remove('active'));
  target.classList.add('active');

  document.querySelectorAll('.side-link').forEach((button) => {
    button.classList.toggle('active', button.dataset.view === viewName);
  });

  document.getElementById('viewTitle').textContent = target.dataset.title || 'Dashboard';
  if (viewName === 'plan') renderCurrentPlan();
  if (isStudent() && viewName === 'evaluaciones') loadStudentEvaluations();
  if (isStudent() && viewName === 'certificados') loadStudentCertificates();
}

function renderCurrentPlan() {
  const usuario = AppState.usuario || {};
  const tipoPlan = usuario.tipo_plan === 'Pagado' ? 'Pagado' : 'Gratuito';
  const isPaid = tipoPlan === 'Pagado';
  const name = document.getElementById('currentPlanName');
  if (!name) return;

  name.textContent = isPaid ? 'Plan pagado' : 'Plan gratuito';
  document.getElementById('currentPlanBadge').textContent = isPaid ? 'PREMIUM' : 'GRATUITO';
  document.getElementById('currentPlanDescription').textContent = isPaid
    ? 'Acceso completo a las experiencias, rutas y recursos habilitados por tu organizacion.'
    : 'Acceso a los cursos y recursos gratuitos habilitados para tu cuenta.';
  document.getElementById('currentPlanIcon').className = isPaid ? 'fa-solid fa-crown' : 'fa-solid fa-seedling';
  document.getElementById('currentPlanCard').classList.toggle('plan-card-paid', isPaid);
  document.getElementById('currentPlanUser').textContent = usuario.Nombres || usuario.usuario || 'Usuario';
}

function showModuleNotice(moduleName) {
  Swal.fire({ icon: 'info', title: moduleName, text: 'La pantalla ya esta habilitada. La operacion avanzada se conectara en la siguiente etapa.', confirmButtonText: 'Entendido' });
}

function saveLocalSettings() {
  toastSuccess('Preferencias guardadas');
}

async function loadDashboard() {
  const container = document.getElementById('dashboardMetrics');
  container.innerHTML = Array.from({ length: 8 }, () => '<div class="col-md-3"><div class="metric-card"><div class="skeleton"></div><div class="skeleton mt-3 w-50"></div></div></div>').join('');

  try {
    const data = await DashboardService.general();
    AppState.dashboardData = data;
    const metrics = isStudent() ? [
      ['Cursos asignados', data.cursosAsignados],
      ['Completados', data.cursosCompletados],
      ['Pendientes', data.cursosPendientes],
      ['Horas completadas', data.horasCapacitacion],
      ['Certificados', data.certificadosObtenidos],
      ['Pasos completados', data.pasosCompletados],
      ['Total de pasos', data.pasosTotales],
      ['Avance general', `${data.avanceGeneral}%`],
    ] : [
      ['Cursos asignados', data.cursosAsignados],
      ['Completados', data.cursosCompletados],
      ['Pendientes', data.cursosPendientes],
      ['Horas', data.horasCapacitacion],
      ['Certificados', data.certificadosObtenidos],
      ['Nota promedio', data.notaPromedio],
      ['Ranking', data.rankingPersonal],
      ['Avance', `${data.avanceGeneral}%`],
    ];

    container.innerHTML = metrics.map(([label, value]) => `
      <div class="col-sm-6 col-xl-3">
        <div class="metric-card">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
        </div>
      </div>
    `).join('');

    document.getElementById('dashboardSummary').innerHTML = metrics.slice(0, 5).map(([label, value]) => `
      <div class="d-flex justify-content-between border-bottom border-secondary pb-2">
        <span class="text-secondary">${label}</span>
        <strong>${value}</strong>
      </div>
    `).join('');

    renderProgressChart(data);
    if (isStudent()) renderStudentDashboard(data);
  } catch (error) {
    container.innerHTML = '<div class="col-12"><div class="alert alert-warning mb-0">No se pudo cargar el dashboard.</div></div>';
  }
}

function renderStudentDashboard(data) {
  const featured = data.cursoDestacado;
  const hero = document.querySelector('.learning-hero-content');
  const description = hero.querySelector('p');
  document.getElementById('profileWelcomeName').textContent = AppState.usuario.Nombres || AppState.usuario.usuario || 'estudiante';
  const level = document.querySelector('.level-progress');
  level.querySelector('.level-copy span').textContent = 'Avance general';
  level.querySelector('.level-copy strong').textContent = `${data.avanceGeneral}%`;
  level.querySelector('.progress-bar').style.width = `${data.avanceGeneral}%`;
  level.querySelector('small').textContent = `${data.cursosCompletados} de ${data.cursosAsignados} cursos completados`;
  const stats = document.querySelectorAll('.profile-stats strong');
  stats[0].textContent = data.horasCapacitacion;
  stats[1].textContent = data.cursosPendientes;
  stats[2].textContent = data.certificadosObtenidos;
  const statLabels = document.querySelectorAll('.profile-stats span');
  statLabels[0].textContent = 'Horas completadas';
  statLabels[1].textContent = 'Cursos pendientes';
  statLabels[2].textContent = 'Certificados';
  const achievement = document.querySelector('.achievement-card');
  achievement.querySelector('h3').textContent = data.certificadosObtenidos ? 'Curso completado' : 'Tu proximo logro';
  achievement.querySelector('p').textContent = data.certificadosObtenidos ? `Has logrado ${data.certificadosObtenidos} certificado(s).` : 'Completa un curso al 100 % para obtener tu primer certificado.';
  achievement.querySelector('.achievement-streak strong').textContent = `${data.avanceGeneral}%`;
  achievement.querySelector('.achievement-streak span').textContent = 'Avance general';
  if (featured) {
    document.getElementById('featuredCourseName').textContent = featured.nombre;
    description.textContent = featured.descripcion_corta || featured.descripcion_completa || 'Continua avanzando en tu curso asignado.';
    document.getElementById('featuredCourseMeta').innerHTML = `<span><i class="fa-regular fa-clock"></i> ${featured.duracion_estimada_min || 0} min</span><span><i class="fa-solid fa-layer-group"></i> ${featured.cantidad_modulos || 0} modulos</span><span><i class="fa-solid fa-chart-line"></i> ${featured.avance}%</span>`;
    hero.querySelector('.hero-actions').innerHTML = `<button class="btn btn-gold btn-lg" type="button" onclick="openStudentCourse(${featured.id})"><i class="fa-solid fa-play me-2"></i>${featured.avance ? 'Continuar curso' : 'Comenzar curso'}</button>`;
  } else {
    document.getElementById('featuredCourseName').textContent = 'Aun no tienes cursos asignados';
    description.textContent = 'Cuando el administrador te asigne un curso, aparecera aqui.';
    document.getElementById('featuredCourseMeta').innerHTML = '<span><i class="fa-solid fa-circle-info"></i> Sin asignaciones</span>';
    hero.querySelector('.hero-actions').innerHTML = '';
  }

  const courses = data.cursos || [];
  document.getElementById('assignedCoursesGrid').innerHTML = courses.length ? courses.map((course) => `
    <article class="visual-course-card course-theme-ai"><div class="course-image">${course.imagen_portada_url ? `<img class="student-course-cover" src="${escapeHtml(course.imagen_portada_url)}" alt="">` : '<div class="course-icon"><i class="fa-solid fa-graduation-cap"></i></div>'}<span class="course-status in-progress">${course.avance === 100 ? 'Completado' : 'Asignado'}</span></div><div class="course-card-body"><span class="course-category">${escapeHtml(course.categoria || 'CURSO')}</span><h3>${escapeHtml(course.nombre)}</h3><div class="course-meta"><span><i class="fa-regular fa-clock"></i> ${course.duracion_estimada_min || 0} min</span><span>${course.lecciones_completadas}/${course.total_lecciones} pasos</span></div><div class="course-progress-copy"><span>Progreso</span><strong>${course.avance}%</strong></div><div class="progress premium-progress"><div class="progress-bar" style="width:${course.avance}%"></div></div><button class="btn course-action" type="button" onclick="openStudentCourse(${course.id})">${course.avance ? 'Continuar aprendizaje' : 'Comenzar curso'}</button></div></article>
  `).join('') : '<div class="empty-state">No tienes cursos asignados.</div>';
}

async function openStudentCourse(id) {
  showView('cursos');
  await openCourseEditor(id);
}

async function loadStudentEvaluations() {
  const container = document.getElementById('evaluationsContent');
  container.innerHTML = '<div class="skeleton"></div>';
  try {
    const items = await EstudianteService.evaluaciones();
    container.className = items.length ? 'student-resource-list' : 'empty-state';
    container.innerHTML = items.length ? items.map((item) => `<article><div><span class="eyebrow">${escapeHtml(item.curso.nombre)}</span><h3>${escapeHtml(item.titulo)}</h3><p>${escapeHtml(item.descripcion || 'Evaluacion asignada')}</p></div><button class="btn btn-gold" onclick="openStudentCourse(${item.curso.id})">Abrir evaluacion</button></article>`).join('') : '<i class="fa-solid fa-clipboard-check fa-2x mb-3"></i><div class="fw-semibold">No tienes evaluaciones asignadas</div>';
  } catch (error) { container.innerHTML = `<div class="text-warning">${escapeHtml(error.message)}</div>`; }
}

async function loadStudentCertificates() {
  const container = document.getElementById('certificatesContent');
  container.innerHTML = '<div class="skeleton"></div>';
  try {
    const items = await EstudianteService.certificados();
    container.className = items.length ? 'student-resource-list' : 'empty-state';
    container.innerHTML = items.length ? items.map((item) => `<article><div class="certificate-icon"><i class="fa-solid fa-award"></i></div><div><span class="eyebrow">CERTIFICADO LOGRADO</span><h3>${escapeHtml(item.curso.nombre)}</h3><p>Codigo: ${escapeHtml(item.codigo)} · Emitido: ${formatDate(item.emitido_at)}</p></div></article>`).join('') : '<i class="fa-solid fa-award fa-2x mb-3"></i><div class="fw-semibold">Aun no tienes certificados</div><small>Completa un curso al 100 % para obtenerlo.</small>';
  } catch (error) { container.innerHTML = `<div class="text-warning">${escapeHtml(error.message)}</div>`; }
}

function renderProgressChart(data) {
  const canvas = document.getElementById('progressChart');
  if (AppState.chart) AppState.chart.destroy();

  AppState.chart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: ['Asignados', 'Completados', 'Pendientes', 'Certificados'],
      datasets: [{
        label: 'Cursos',
        data: [data.cursosAsignados, data.cursosCompletados, data.cursosPendientes, data.certificadosObtenidos],
        backgroundColor: ['#F4B400', '#f7d774', '#757575', '#ffffff'],
        borderWidth: 0,
      }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#a7a7a7' }, grid: { color: '#252525' } },
        y: { ticks: { color: '#a7a7a7' }, grid: { color: '#252525' } },
      },
    },
  });
}

async function loadRoles() {
  try {
    AppState.roles = await UsuariosService.roles();
    renderRoleOptions();
  } catch (error) {
    AppState.roles = [];
  }
}

function renderRoleOptions() {
  const select = document.getElementById('fieldRol');
  select.innerHTML = '<option value="">Seleccionar rol</option>' + AppState.roles.map((rol) => (
    `<option value="${rol.id}">${rol.nombre}</option>`
  )).join('');
}

async function loadUsers() {
  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = '<tr><td colspan="10"><div class="skeleton"></div></td></tr>';

  try {
    AppState.usuarios = await UsuariosService.listar();
    renderUsersTable();
  } catch (error) {
    tbody.innerHTML = `<tr><td colspan="10" class="text-warning">${error.message}</td></tr>`;
  }
}

function renderUsersTable() {
  const search = document.getElementById('userSearch').value.toLowerCase();
  const status = document.getElementById('userStatusFilter').value;
  const tbody = document.getElementById('usersTableBody');

  const users = AppState.usuarios.filter((user) => {
    const text = [user.DNI, user.Nombres, user.Correo, user.Cargo, user.Campaña, user.usuario, user.rol && user.rol.nombre].join(' ').toLowerCase();
    return (!search || text.includes(search)) && (!status || user.Estado === status);
  });

  if (users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="text-secondary">No hay usuarios para mostrar.</td></tr>';
    return;
  }

  tbody.innerHTML = users.map((user) => `
    <tr>
      <td>${escapeHtml(user.DNI || '')}</td>
      <td>${escapeHtml(user.Nombres || '')}</td>
      <td>${escapeHtml(user.Correo || '')}</td>
      <td>${escapeHtml(user.Cargo || '')}</td>
      <td>${escapeHtml(user.Campaña || '')}</td>
      <td><span class="badge ${user.Estado === 'Activo' ? 'text-bg-success' : 'text-bg-secondary'}">${escapeHtml(user.Estado || '')}</span></td>
      <td>${escapeHtml(user.usuario || '')}</td>
      <td>${escapeHtml(user.rol ? user.rol.nombre : '')}</td>
      <td><span class="badge ${user.tipo_plan === 'Pagado' ? 'plan-badge-paid' : 'badge-soft'}">${escapeHtml(user.tipo_plan || 'Gratuito')}</span></td>
      <td class="text-end">
        <button class="btn btn-outline-light btn-sm me-1" type="button" onclick="openEditUserModal(${user.id})"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-outline-danger btn-sm" type="button" onclick="confirmDeleteUser(${user.id})"><i class="fa-solid fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function openCreateUserModal() {
  document.getElementById('userModalTitle').textContent = 'Crear usuario';
  document.getElementById('userForm').reset();
  document.getElementById('userId').value = '';
  document.getElementById('fieldEstado').value = 'Activo';
  document.getElementById('fieldTipoPlan').value = 'Gratuito';
  document.getElementById('fieldPassword').required = true;
  renderAssignedCourseOptions([]);
  AppState.userModal.show();
}

async function openEditUserModal(id) {
  const user = AppState.usuarios.find((item) => item.id === id);
  if (!user) return;

  document.getElementById('userModalTitle').textContent = 'Editar usuario';
  document.getElementById('userId').value = user.id;
  document.getElementById('fieldDNI').value = user.DNI || '';
  document.getElementById('fieldNombres').value = user.Nombres || '';
  document.getElementById('fieldCorreo').value = user.Correo || '';
  document.getElementById('fieldCargo').value = user.Cargo || '';
  document.getElementById('fieldCampana').value = user.Campaña || '';
  document.getElementById('fieldSupervisor').value = user.Supervisor || '';
  document.getElementById('fieldEstado').value = user.Estado || 'Activo';
  document.getElementById('fieldFechaIngreso').value = user.fecha_ingreso || '';
  document.getElementById('fieldUsuario').value = user.usuario || '';
  document.getElementById('fieldRol').value = user.rol_id || '';
  document.getElementById('fieldTipoPlan').value = user.tipo_plan || 'Gratuito';
  document.getElementById('fieldPassword').value = '';
  document.getElementById('fieldPassword').required = false;
  try {
    renderAssignedCourseOptions(await UsuariosService.asignaciones(id));
  } catch (error) {
    renderAssignedCourseOptions([]);
  }
  AppState.userModal.show();
}

function renderAssignedCourseOptions(selectedIds) {
  const selected = new Set((selectedIds || []).map(Number));
  const courses = AppState.cursos.filter((course) => course.estado === 'Publicado');
  document.getElementById('fieldAssignedCourses').innerHTML = courses.map((course) => `<option value="${course.id}" ${selected.has(course.id) ? 'selected' : ''}>${escapeHtml(course.nombre)}</option>`).join('');
}

async function handleSaveUser(event) {
  event.preventDefault();
  const id = document.getElementById('userId').value;
  const payload = {
    DNI: document.getElementById('fieldDNI').value.trim(),
    Nombres: document.getElementById('fieldNombres').value.trim(),
    Correo: document.getElementById('fieldCorreo').value.trim(),
    Cargo: document.getElementById('fieldCargo').value.trim(),
    Campaña: document.getElementById('fieldCampana').value.trim(),
    Supervisor: document.getElementById('fieldSupervisor').value.trim(),
    Estado: document.getElementById('fieldEstado').value,
    fecha_ingreso: document.getElementById('fieldFechaIngreso').value,
    usuario: document.getElementById('fieldUsuario').value.trim(),
    rol_id: Number(document.getElementById('fieldRol').value),
    tipo_plan: document.getElementById('fieldTipoPlan').value,
  };

  const password = document.getElementById('fieldPassword').value;
  if (password) payload.password = password;

  try {
    const savedUser = id ? await UsuariosService.actualizar(id, payload) : await UsuariosService.crear(payload);

    AppState.userModal.hide();

  } catch (error) {

}

async function confirmDeleteUser(id) {

function exportUsersCsv() {
  const headers = ['DNI', 'Nombres', 'Correo', 'Cargo', 'Campana', 'Supervisor', 'Estado', 'Fecha ingreso', 'Usuario', 'Rol', 'Plan'];
  const rows = AppState.usuarios.map((user) => [
    user.DNI,
    user.Nombres,
    user.Correo,
    user.Cargo,
    user.Campaña,
    user.Supervisor,
    user.Estado,
    user.fecha_ingreso,
    user.usuario,
    user.rol ? user.rol.nombre : '',
    user.tipo_plan || 'Gratuito',
  ]);

  const csv = [headers, ...rows].map((row) => row.map((cell) => `"${String(cell || '').replaceAll('"', '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'usuarios-an-academy.csv';
  link.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

async function loadCourses() {
  const tbody = document.getElementById('coursesTableBody');
  tbody.innerHTML = '<tr><td colspan="6"><div class="skeleton"></div></td></tr>';
  try {
    AppState.cursos = await CursosService.listar();
    if (!isStudent()) renderAssignedCourseOptions([]);
    renderCoursesTable();
  } catch (error) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-warning">${escapeHtml(error.message)}</td></tr>`;
  }
}

function renderCoursesTable() {
  const search = document.getElementById('courseSearch').value.trim().toLowerCase();
  const status = document.getElementById('courseStatusFilter').value;
  const category = document.getElementById('courseCategoryFilter').value.trim().toLowerCase();
  const courses = AppState.cursos.filter((curso) => {
    const text = [curso.nombre, curso.descripcion_corta, curso.categoria, curso.campana_area].join(' ').toLowerCase();
    return (!search || text.includes(search)) && (!status || curso.estado === status) && (!category || String(curso.categoria || '').toLowerCase().includes(category));
  });
  const tbody = document.getElementById('coursesTableBody');
  const canManage = canManageCourses();
  document.querySelector('#coursesListPanel .eyebrow').textContent = canManage ? 'ADMINISTRACION ACADEMICA' : 'MI APRENDIZAJE';
  document.querySelector('#coursesListPanel h1').textContent = canManage ? 'Gestion de Cursos' : 'Mis cursos';
  document.querySelector('#coursesListPanel p').textContent = canManage ? 'Disena experiencias, rutas y contenidos de aprendizaje potenciados por IA.' : 'Cursos asignados por tu administrador y avance de aprendizaje.';
  if (!courses.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-secondary">${canManage ? 'No hay cursos para mostrar.' : 'Aun no tienes cursos asignados.'}</td></tr>`;
    return;
  }
  tbody.innerHTML = courses.map((curso) => `
    <tr>
      <td><div class="fw-semibold">${escapeHtml(curso.nombre)}</div><small class="text-secondary">${escapeHtml(curso.descripcion_corta || '')}</small></td>
      <td>${escapeHtml(curso.categoria || '-')}</td>
      <td>${curso.cantidad_modulos || 0}</td>
      <td><span class="badge ${courseStatusClass(curso.estado)}">${escapeHtml(curso.estado)}</span></td>
      <td>${formatDate(curso.created_at)}</td>
      <td class="text-end text-nowrap">${canManage ? `
        <button class="btn btn-outline-light btn-sm" title="Ver" onclick="openCourseEditor(${curso.id})"><i class="fa-solid fa-eye"></i></button>
        <button class="btn btn-outline-warning btn-sm" title="Editar" onclick="openEditCourseModal(${curso.id})"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-outline-info btn-sm" title="Duplicar" onclick="duplicateCourse(${curso.id})"><i class="fa-solid fa-copy"></i></button>
        <button class="btn btn-outline-success btn-sm" title="Publicar" onclick="setCourseStatus(${curso.id}, 'Publicado')"><i class="fa-solid fa-globe"></i></button>
        <button class="btn btn-outline-secondary btn-sm" title="Desactivar" onclick="setCourseStatus(${curso.id}, 'Inactivo')"><i class="fa-solid fa-ban"></i></button>
        <button class="btn btn-outline-danger btn-sm" title="Eliminar" onclick="deleteCourse(${curso.id})"><i class="fa-solid fa-trash"></i></button>
      ` : `<button class="btn btn-gold btn-sm" onclick="openCourseEditor(${curso.id})"><i class="fa-solid fa-play me-2"></i>Continuar curso</button>`}</td>
    </tr>
  `).join('');
}

function courseStatusClass(status) {
  if (status === 'Publicado') return 'text-bg-success';
  if (status === 'Inactivo') return 'text-bg-secondary';
  return 'text-bg-warning';
}

function formatDate(value) {
  return value ? new Date(value).toLocaleDateString('es-PE') : '-';
}

function renderModulesEditor() {
  const container = document.getElementById('modulesEditor');

  if (!canManageCourses()) {

      <article class="module-editor-card mb-3"><div class="module-editor-header"><div><div class="text-secondary small">Modulo ${index + 1}</div><h3 class="h5 mb-1">${escapeHtml(modulo.nombre)}</h3><small class="text-secondary">${modulo.lecciones.length} pasos · ${modulo.duracion_estimada_min || 0} min</small></div></div>

    return;

  container.innerHTML = modulos.map((modulo, index) => `
    <article class="module-editor-card mb-3">
      <div class="module-editor-header">
        <div><div class="text-secondary small">Modulo ${index + 1}</div><h3 class="h5 mb-1">${escapeHtml(modulo.nombre)}</h3><small class="text-secondary">${modulo.lecciones.length} pasos · ${modulo.duracion_estimada_min || 0} min · ${escapeHtml(modulo.estado)}</small></div>
        <div class="d-flex flex-wrap gap-1">

          <button class="btn btn-outline-light btn-sm" onclick="moveModule(${modulo.id}, 'down')"><i class="fa-solid fa-arrow-down"></i></button>

}

function openStudentLesson(index) {
  AppState.studentLessonIndex = index;
  renderStudentLesson();
  AppState.coursePreviewModal.show();
}

function renderStudentLesson() {
  const leccion = AppState.studentLessons[AppState.studentLessonIndex];
  if (!leccion) return;
  document.getElementById('coursePreviewBody').innerHTML = `
    <div class="student-lesson-view">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-4"><div><div class="text-secondary">Paso ${AppState.studentLessonIndex + 1} de ${AppState.studentLessons.length}</div><h2>${escapeHtml(leccion.titulo)}</h2><p class="text-secondary">${escapeHtml(leccion.descripcion || '')}</p></div><span class="badge badge-soft">${escapeHtml(leccion.tipo_contenido)}</span></div>
      <div class="lesson-content mb-4">${renderLessonPreview(leccion)}</div>
      <div class="d-flex flex-wrap justify-content-between gap-2"><button class="btn btn-outline-light" ${AppState.studentLessonIndex === 0 ? 'disabled' : ''} onclick="navigateStudentLesson(-1)"><i class="fa-solid fa-arrow-left me-2"></i>Anterior</button><button class="btn btn-outline-success" onclick="completeStudentLesson()"><i class="fa-solid fa-check me-2"></i>Marcar como completado</button><button class="btn btn-gold" ${AppState.studentLessonIndex >= AppState.studentLessons.length - 1 ? 'disabled' : ''} onclick="navigateStudentLesson(1)">Siguiente<i class="fa-solid fa-arrow-right ms-2"></i></button></div>
    </div>`;
}

function navigateStudentLesson(offset) { AppState.studentLessonIndex += offset; renderStudentLesson(); }
async function completeStudentLesson() { const leccion = AppState.studentLessons[AppState.studentLessonIndex]; try { await CursosService.completarLeccion(leccion.id); leccion.progreso = { completado: true }; renderStudentLesson(); toastSuccess('Paso completado'); } catch (error) { Swal.fire('No se pudo registrar el avance', error.message, 'error'); } }
</script>
