function handleExpiredSession() {
  AuthService.logout();
  AppState.usuario = null;
  document.querySelectorAll('.modal.show').forEach((element) => {
    const instance = bootstrap.Modal.getInstance(element);
    if (instance) instance.hide();
  });
  document.querySelectorAll('.modal-backdrop').forEach((element) => element.remove());
  document.body.classList.remove('modal-open');
  document.body.style.removeProperty('padding-right');
  if (typeof Swal !== 'undefined') Swal.close();
  showLogin();
  setTimeout(() => Swal.fire('Sesion expirada', 'Vuelve a iniciar sesion para continuar con tu curso.', 'info'), 50);
}

async function boot() {
  const token = ApiService.getToken();
  if (!token) {
    showLogin();
    return;
  }

  try {
    const usuario = await AuthService.me();
    await startSession(usuario);
  } catch (error) {
    AuthService.logout();
    showLogin();
  }
}

async function handleLogin(event) {
  event.preventDefault();
  const button = document.getElementById('loginButton');
  const usuario = document.getElementById('loginUsuario').value.trim();
  const password = document.getElementById('loginPassword').value;

  button.disabled = true;
  button.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando';

  try {
    const sessionUser = await AuthService.login(usuario, password, document.getElementById('rememberMe').checked);
    await startSession(sessionUser);
    Swal.fire({ toast: true, position: 'top-end', timer: 2200, showConfirmButton: false, icon: 'success', title: 'Sesion iniciada' });
  } catch (error) {
    Swal.fire('No se pudo iniciar sesion', error.message, 'error');
  } finally {
    button.disabled = false;
    button.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar';
  }
}

async function startSession(usuario) {
  AppState.usuario = usuario;
  document.getElementById('sessionName').textContent = usuario.Nombres || usuario.usuario;
  document.getElementById('sessionRole').textContent = usuario.rol ? usuario.rol.nombre : 'Sin rol';
  document.getElementById('openCourseModal').classList.toggle('d-none', !canManageCourses());
  renderMenu();
  configureRoleInterface();
  showApp();
  renderCurrentPlan();
  showView('dashboard');
  await Promise.allSettled(isStudent() ? [loadDashboard(), loadCourses()] : [loadDashboard(), loadRoles(), loadUsers(), loadCourses()]);
}

function isStudent() {
  return Boolean(AppState.usuario && AppState.usuario.rol && AppState.usuario.rol.nombre === 'Estudiante');
}

function configureRoleInterface() {
  const student = isStudent();
  document.getElementById('createEvaluationButton').classList.toggle('d-none', student);
  document.getElementById('createCertificateButton').classList.toggle('d-none', student);
  document.getElementById('createForumButton').classList.toggle('d-none', student);
  document.getElementById('evaluationAdminFilters').classList.toggle('d-none', student);
  document.querySelector('#view-certificados .row').classList.toggle('d-none', student);
  document.getElementById('openCourseModal').classList.toggle('d-none', !canManageCourses());
  const navButtons = document.querySelectorAll('.main-navigation button');
  navButtons.forEach((button) => {
    const label = button.textContent.trim();
    if (student && label === 'Categorias') button.classList.add('d-none');
    else button.classList.remove('d-none');
  });
  document.querySelectorAll('#view-dashboard .section-heading').forEach((heading) => {
    const demoSection = heading.textContent.includes('DESARROLLA NUEVAS HABILIDADES') || heading.textContent.includes('CRECE PASO A PASO');
    if (demoSection) {
      heading.classList.toggle('d-none', student);
      if (heading.nextElementSibling) heading.nextElementSibling.classList.toggle('d-none', student);
    }
  });
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('d-none');
  document.getElementById('appShell').classList.add('d-none');
}

function showApp() {
  document.getElementById('loginScreen').classList.add('d-none');
  document.getElementById('appShell').classList.remove('d-none');
}

function handleLogout() {
  AuthService.logout();

function renderMenu() {
  const rol = AppState.usuario && AppState.usuario.rol ? AppState.usuario.rol.nombre : 'Estudiante';
  const items = MENUS[rol] || MENUS.Estudiante;
  const nav = document.getElementById('sideNav');

  nav.innerHTML = items.map(([view, icon, label]) => `
    <button class="side-link" type="button" data-view="${view}">
      <i class="fa-solid ${icon}"></i>
      <span class="nav-label">${label}</span>
    </button>
  `).join('');

  nav.querySelectorAll('.side-link').forEach((button) => {
    button.addEventListener('click', () => showView(button.dataset.view));
  });
}

function showView(viewName) {
  const studentBlockedViews = ['usuarios', 'cursos', 'modulos', 'lecciones', 'reportes', 'configuracion', 'administracion'];
  if (isStudent() && studentBlockedViews.includes(viewName)) viewName = 'student-courses';
  if (!isStudent() && viewName === 'student-courses') viewName = 'cursos';
  let target = document.getElementById(`view-${viewName}`);
  if (!target) {
    target = document.getElementById('view-not-found');
    document.getElementById('missingViewMessage').textContent = `La seccion "${viewName}" todavia no tiene una pantalla configurada.`;
  }
  document.querySelectorAll('.view').forEach((view) => view.classList.remove('active'));
  target.classList.add('active');

  document.querySelectorAll('.side-link').forEach((button) => {
    button.classList.toggle('active', button.dataset.view === viewName);
  });

  document.getElementById('viewTitle').textContent = target.dataset.title || 'Dashboard';
  if (viewName === 'plan') renderCurrentPlan();
  if (isStudent() && viewName === 'student-courses') loadStudentCourses();
  if (viewName === 'evaluaciones') loadEvaluations();
  if (isStudent() && viewName === 'certificados') loadStudentCertificates();
}

function renderCurrentPlan() {

  const isPaid = tipoPlan === 'Pagado';

  document.getElementById('currentPlanCard').classList.toggle('plan-card-paid', isPaid);
  document.getElementById('currentPlanUser').textContent = usuario.Nombres || usuario.usuario || 'Usuario';
}

      ['Certificados', data.certificadosObtenidos],
      ['Pasos completados', data.pasosCompletados],

    container.innerHTML = metrics.map(([label, value]) => `
      <div class="col-sm-6 col-xl-3">

async function openStudentCourse(id) {
  if (!isStudent()) {
    await openCourseEditor(id);
    return;
  }
  try {
    AppState.cursoActual = await CursosService.aprender(id);
    AppState.previewMode = false;
    AppState.studentLessons = buildStudentJourney(AppState.cursoActual);
    const firstPending = AppState.studentLessons.findIndex((item) => !item.completada && !(item.progreso && item.progreso.completado));
    AppState.studentLessonIndex = firstPending >= 0 ? firstPending : Math.max(AppState.studentLessons.length - 1, 0);
    renderStudentCoursePlayer();
    document.querySelectorAll('.modal-backdrop').forEach((element) => element.remove());
    document.body.classList.remove('modal-open');
    showView('student-course-player');
  } catch (error) {
    if (error.status === 401) return;
    Swal.fire('No se pudo abrir el curso', error.message, 'error');
  }
}

function buildStudentJourney(course) {
  const activities = course.actividades || [];
  const journey = [];
  let locked = false;
  const appendActivity = (activity, moduleName) => {
    journey.push({ ...activity, es_actividad: true, modulo_nombre: moduleName || 'Actividad del curso', bloqueado: locked });
    if (activity.obligatoria && activity.bloquea_avance && !activity.completada) locked = true;
  };
  (course.modulos || []).forEach((module) => {
    const items = [
      ...(module.lecciones || []).map((lesson) => ({ ...lesson, sequenceType: 'lesson' })),
      ...activities.filter((activity) => activity.orden != null && Number(activity.modulo_id) === Number(module.id)).map((activity) => ({ ...activity, sequenceType: 'activity' })),
    ].sort((a,b) => Number(a.orden || 0) - Number(b.orden || 0));
    items.forEach((item) => {
      if (item.sequenceType === 'activity') appendActivity(item, module.nombre);
      else {
        journey.push({ ...item, modulo_nombre: module.nombre, bloqueado: locked });
        activities.filter((activity) => activity.orden == null && activity.ubicacion === 'DespuesPaso' && Number(activity.leccion_id) === Number(item.id)).forEach((activity) => appendActivity(activity, module.nombre));
      }
    });
    activities.filter((activity) => activity.orden == null && activity.ubicacion === 'FinModulo' && Number(activity.modulo_id) === Number(module.id)).forEach((activity) => appendActivity(activity, module.nombre));
  });
  activities.filter((activity) => activity.ubicacion === 'FinCurso').forEach((activity) => appendActivity(activity, 'Cierre del curso'));
  return journey;
}

async function loadStudentCourses() {
  if (!isStudent()) return;
  const grid = document.getElementById('studentCoursesGrid');
  grid.innerHTML = '<div class="empty-state"><span class="spinner-border spinner-border-sm me-2"></span>Cargando tus cursos...</div>';
  try {
    const data = await DashboardService.general();
    AppState.dashboardData = data;
    renderStudentCoursesCatalog();
  } catch (error) {
    grid.innerHTML = `<div class="empty-state text-warning">${escapeHtml(error.message)}</div>`;
  }
}

function studentCourseState(course) {
  const progress = Number(course.avance || 0);
  if (progress >= 100) return { key: 'completed', label: 'Completado', action: 'Ver curso', icon: 'fa-circle-check' };
  if (progress > 0) return { key: 'in-progress', label: 'En progreso', action: 'Reanudar curso', icon: 'fa-play' };
  return { key: 'not-started', label: 'No iniciado', action: 'Iniciar curso', icon: 'fa-play' };
}

function renderStudentCoursesCatalog() {
  if (!isStudent()) return;
  const courses = (AppState.dashboardData && AppState.dashboardData.cursos) || [];
  const search = (document.getElementById('studentCourseSearch').value || '').trim().toLowerCase();
  const filter = document.getElementById('studentCourseProgressFilter').value;
  const visible = courses.filter((course) => {
    const state = studentCourseState(course);
    const matchesSearch = `${course.nombre || ''} ${course.categoria || ''}`.toLowerCase().includes(search);
    return matchesSearch && (filter === 'all' || state.key === filter);
  });
  document.getElementById('studentCoursesTotal').textContent = courses.length;
  document.getElementById('studentCoursesInProgress').textContent = courses.filter((course) => studentCourseState(course).key === 'in-progress').length;
  document.getElementById('studentCoursesCompleted').textContent = courses.filter((course) => studentCourseState(course).key === 'completed').length;
  document.getElementById('studentCoursesGrid').innerHTML = visible.length ? visible.map((course) => {
    const state = studentCourseState(course);
    const progress = Math.min(100, Math.max(0, Number(course.avance || 0)));
    const completed = Number(course.lecciones_completadas || 0);
    const total = Number(course.total_lecciones || 0);
    return `<article class="student-catalog-card">
      <div class="student-catalog-cover">
        ${course.imagen_portada_url ? `<img src="${escapeHtml(course.imagen_portada_url)}" alt="Portada de ${escapeHtml(course.nombre)}">` : '<div class="student-catalog-placeholder"><i class="fa-solid fa-graduation-cap"></i></div>'}

async function loadEvaluations() {
  const container = document.getElementById('evaluationsContent');
  container.innerHTML = '<div class="skeleton"></div>';
  try {
    if (AppState.evaluationTab === 'forums') {
      AppState.foros = await EvaluacionesService.listarForos();
      renderForums();
      return;
    }
    const params = isStudent() ? {} : { curso_id: document.getElementById('evaluationCourseFilter').value, estado: document.getElementById('evaluationStatusFilter').value };
    AppState.evaluaciones = await EvaluacionesService.listar(params);
    populateEvaluationCourseSelectors();
    if (isStudent()) renderStudentEvaluations(); else renderAdminEvaluations();

function setEvaluationTab(tab) {

function populateEvaluationCourseSelectors() {

async function openEvaluationModal(id = null, context = null) {
  document.getElementById('evaluationForm').reset(); document.getElementById('evaluationId').value = id || ''; AppState.evaluationQuestions = []; AppState.evaluationContext = context;
  populateEvaluationCourseSelectors();
  if (id) { const item = await EvaluacionesService.obtener(id); AppState.loadedEvaluation = item; AppState.evaluationHasAttempts = Number(item.cantidad_intentos || 0) > 0; document.getElementById('evaluationModalTitle').textContent = 'Editar evaluacion'; document.getElementById('evaluationTitle').value = item.titulo; document.getElementById('evaluationDescription').value = item.descripcion || ''; document.getElementById('evaluationCourse').value = item.curso_id; await loadEvaluationLocations(); document.getElementById('evaluationModule').value = item.modulo_id || ''; await loadEvaluationLessons(); document.getElementById('evaluationLesson').value = item.leccion_id || ''; document.getElementById('evaluationLocation').value = item.ubicacion; document.getElementById('evaluationStatus').value = item.estado; document.getElementById('evaluationAttempts').value = item.intentos_permitidos; document.getElementById('evaluationPassing').value = item.puntaje_minimo; document.getElementById('evaluationTime').value = item.tiempo_limite_min || ''; document.getElementById('evaluationStart').value = item.fecha_inicio ? item.fecha_inicio.slice(0,16) : ''; document.getElementById('evaluationDeadline').value = item.fecha_limite ? item.fecha_limite.slice(0,16) : ''; document.getElementById('evaluationRequired').checked = item.obligatoria; document.getElementById('evaluationBlocks').checked = item.bloquea_avance; document.getElementById('evaluationRetry').checked = item.permitir_reintentos; document.getElementById('evaluationUnlock').value = item.condicion_desbloqueo; document.getElementById('evaluationBlockMessage').value = item.mensaje_bloqueo || ''; AppState.evaluationQuestions = item.preguntas || []; } else { AppState.loadedEvaluation = null; AppState.evaluationHasAttempts = false; document.getElementById('evaluationModalTitle').textContent = 'Nueva evaluacion'; }
  if (context) {
    const courseSelect = document.getElementById('evaluationCourse');
    if (!Array.from(courseSelect.options).some((option) => Number(option.value) === Number(context.courseId))) courseSelect.insertAdjacentHTML('beforeend', `<option value="${context.courseId}">${escapeHtml(AppState.cursoActual ? AppState.cursoActual.nombre : 'Curso actual')}</option>`);
    courseSelect.value = context.courseId;
    await loadEvaluationLocations();
    document.getElementById('evaluationModule').value = context.moduleId;
    document.getElementById('evaluationLesson').value = '';
    document.getElementById('evaluationLocation').value = 'FinModulo';
  }
  ['evaluationCourseField','evaluationModuleField','evaluationLessonField','evaluationLocationField'].forEach((fieldId) => document.getElementById(fieldId).classList.toggle('d-none', Boolean(context)));
  const evaluationSettings = id ? (AppState.loadedEvaluation || AppState.evaluaciones.find((evaluation) => Number(evaluation.id) === Number(id)) || {}) : {};
  document.getElementById('evaluationShowResult').checked = evaluationSettings.mostrar_resultado !== false;
  document.getElementById('evaluationShowCorrect').checked = Boolean(evaluationSettings.mostrar_correctas);
  document.getElementById('evaluationFeedback').checked = evaluationSettings.permitir_retroalimentacion !== false;
  document.getElementById('evaluationRandomQuestions').checked = Boolean(evaluationSettings.preguntas_aleatorias);
  document.getElementById('evaluationRandomOptions').checked = Boolean(evaluationSettings.alternativas_aleatorias);
  renderEvaluationQuestions();
  if (AppState.evaluationHasAttempts) {
    const builder = document.getElementById('evaluationQuestionsBuilder');
    builder.insertAdjacentHTML('afterbegin', '<div class="alert alert-warning">Las preguntas estan bloqueadas porque ya existen intentos. Puedes editar la configuracion general sin perder resultados.</div>');
    builder.querySelectorAll('input,select,textarea,button').forEach((element) => { element.disabled = true; });
  }
  AppState.evaluationModal.show();
}

async function loadEvaluationLocations() { const courseId = document.getElementById('evaluationCourse').value; const moduleSelect = document.getElementById('evaluationModule'); moduleSelect.innerHTML = '<option value="">Opcional</option>'; document.getElementById('evaluationLesson').innerHTML = '<option value="">Opcional</option>'; if (!courseId) return; const course = await CursosService.obtener(courseId); moduleSelect.innerHTML += (course.modulos || []).map((module) => `<option value="${module.id}">${escapeHtml(module.nombre)}</option>`).join(''); AppState.evaluationCourseStructure = course; }
async function loadEvaluationLessons() { const moduleId = Number(document.getElementById('evaluationModule').value); const module = AppState.evaluationCourseStructure && AppState.evaluationCourseStructure.modulos.find((item) => item.id === moduleId); document.getElementById('evaluationLesson').innerHTML = '<option value="">Opcional</option>' + (module ? module.lecciones.map((lesson) => `<option value="${lesson.id}">${escapeHtml(lesson.titulo)}</option>`).join('') : ''); }
function addEvaluationQuestion() { AppState.evaluationQuestions.push({ enunciado: '', tipo: 'OpcionUnica', puntaje: 1, opciones: [{ texto: '', es_correcta: true }, { texto: '', es_correcta: false }] }); renderEvaluationQuestions(); }
function renderEvaluationQuestions() { const container = document.getElementById('evaluationQuestionsBuilder'); container.innerHTML = AppState.evaluationQuestions.length ? AppState.evaluationQuestions.map((question, index) => `<article class="question-builder-card" data-question-index="${index}"><div class="question-builder-top"><span>${index + 1}</span><input class="form-control question-enunciado" value="${escapeHtml(question.enunciado || '')}" placeholder="Escribe el enunciado"><select class="form-select question-tipo" onchange="changeQuestionType(${index},this.value)">${['OpcionUnica','OpcionMultiple','VerdaderoFalso','TextoCorto','TextoLargo'].map((type) => `<option ${question.tipo === type ? 'selected' : ''}>${type}</option>`).join('')}</select><input class="form-control question-score" type="number" min="0" value="${question.puntaje || 1}" title="Puntaje"><button class="btn btn-outline-danger" type="button" onclick="removeEvaluationQuestion(${index})"><i class="fa-solid fa-trash"></i></button></div>${renderQuestionOptions(question, index)}<textarea class="form-control question-feedback mt-2" rows="2" placeholder="Explicacion o guia para el evaluador">${escapeHtml(question.explicacion || question.guia_instructor || '')}</textarea></article>`).join('') : '<div class="empty-state">Agrega al menos una pregunta.</div>'; }
function renderQuestionOptions(question, index) { if (['TextoCorto','TextoLargo'].includes(question.tipo)) return '<div class="question-open-hint"><i class="fa-solid fa-user-check"></i>Esta pregunta requiere calificacion manual.</div>'; const options = question.tipo === 'VerdaderoFalso' ? (question.opciones && question.opciones.length ? question.opciones : [{ texto:'Verdadero',es_correcta:true },{ texto:'Falso',es_correcta:false }]) : question.opciones || []; return `<div class="question-options">${options.map((option, optionIndex) => `<label><input class="form-check-input question-correct" type="${question.tipo === 'OpcionMultiple' ? 'checkbox' : 'radio'}" name="correct-${index}" ${option.es_correcta ? 'checked' : ''}><input class="form-control question-option-text" value="${escapeHtml(option.texto || '')}" ${question.tipo === 'VerdaderoFalso' ? 'readonly' : ''}><button class="btn btn-sm btn-outline-danger" type="button" onclick="removeQuestionOption(${index},${optionIndex})" ${question.tipo === 'VerdaderoFalso' ? 'disabled' : ''}><i class="fa-solid fa-xmark"></i></button></label>`).join('')}</div>${question.tipo !== 'VerdaderoFalso' ? `<button class="btn btn-sm btn-outline-info mt-2" type="button" onclick="addQuestionOption(${index})">Agregar alternativa</button>` : ''}`; }
function syncEvaluationQuestions() { document.querySelectorAll('.question-builder-card').forEach((card) => { const index = Number(card.dataset.questionIndex); const question = AppState.evaluationQuestions[index]; question.enunciado = card.querySelector('.question-enunciado').value.trim(); question.tipo = card.querySelector('.question-tipo').value; question.puntaje = Number(card.querySelector('.question-score').value || 0); question.explicacion = card.querySelector('.question-feedback').value.trim(); const optionRows = card.querySelectorAll('.question-options label'); if (optionRows.length) question.opciones = Array.from(optionRows).map((row) => ({ texto: row.querySelector('.question-option-text').value.trim(), es_correcta: row.querySelector('.question-correct').checked })); }); }
function changeQuestionType(index, type) { syncEvaluationQuestions(); const question = AppState.evaluationQuestions[index]; question.tipo = type; if (type === 'VerdaderoFalso') question.opciones = [{ texto:'Verdadero',es_correcta:true },{ texto:'Falso',es_correcta:false }]; if (['OpcionUnica','OpcionMultiple'].includes(type) && (!question.opciones || question.opciones.length < 2)) question.opciones = [{texto:'',es_correcta:true},{texto:'',es_correcta:false}]; renderEvaluationQuestions(); }
function removeEvaluationQuestion(index) { syncEvaluationQuestions(); AppState.evaluationQuestions.splice(index,1); renderEvaluationQuestions(); } function addQuestionOption(index) { syncEvaluationQuestions(); AppState.evaluationQuestions[index].opciones.push({texto:'',es_correcta:false}); renderEvaluationQuestions(); } function removeQuestionOption(index, optionIndex) { syncEvaluationQuestions(); if (AppState.evaluationQuestions[index].opciones.length <= 2) return; AppState.evaluationQuestions[index].opciones.splice(optionIndex,1); renderEvaluationQuestions(); }
async function saveEvaluation(event) { event.preventDefault(); syncEvaluationQuestions(); const id = document.getElementById('evaluationId').value; const context = AppState.evaluationContext; const payload = { titulo: document.getElementById('evaluationTitle').value.trim(), descripcion: document.getElementById('evaluationDescription').value.trim(), curso_id: Number(document.getElementById('evaluationCourse').value), modulo_id: document.getElementById('evaluationModule').value || null, leccion_id: document.getElementById('evaluationLesson').value || null, ubicacion: document.getElementById('evaluationLocation').value, estado: document.getElementById('evaluationStatus').value, intentos_permitidos: Number(document.getElementById('evaluationAttempts').value), puntaje_minimo: Number(document.getElementById('evaluationPassing').value), tiempo_limite_min: Number(document.getElementById('evaluationTime').value) || null, fecha_inicio: document.getElementById('evaluationStart').value || null, fecha_limite: document.getElementById('evaluationDeadline').value || null, obligatoria: document.getElementById('evaluationRequired').checked, bloquea_avance: document.getElementById('evaluationBlocks').checked, permitir_reintentos: document.getElementById('evaluationRetry').checked, condicion_desbloqueo: document.getElementById('evaluationUnlock').value, mensaje_bloqueo: document.getElementById('evaluationBlockMessage').value.trim(), mostrar_resultado: document.getElementById('evaluationShowResult').checked, mostrar_correctas: document.getElementById('evaluationShowCorrect').checked, permitir_retroalimentacion: document.getElementById('evaluationFeedback').checked, preguntas_aleatorias: document.getElementById('evaluationRandomQuestions').checked, alternativas_aleatorias: document.getElementById('evaluationRandomOptions').checked }; if (!AppState.evaluationHasAttempts) payload.preguntas = AppState.evaluationQuestions; try { if (id) await EvaluacionesService.actualizar(id,payload); else await EvaluacionesService.crear(payload); AppState.evaluationModal.hide(); if (context) await openCourseEditor(context.courseId); else await loadEvaluations(); toastSuccess('Evaluacion guardada'); } catch(error) { Swal.fire('No se pudo guardar',error.message,'error'); } }
async function duplicateEvaluation(id) { try { await EvaluacionesService.duplicar(id); await loadEvaluations(); toastSuccess('Evaluacion duplicada'); } catch(error){ Swal.fire('No se pudo duplicar',error.message,'error'); } }
async function deleteEvaluation(id) { if (!(await confirmAction('Eliminar evaluacion','Se eliminaran preguntas e intentos asociados.'))) return; try { await EvaluacionesService.eliminar(id); await loadEvaluations(); } catch(error){ Swal.fire('No se pudo eliminar',error.message,'error'); } }
async function showEvaluationResults(id) {
  try {
    const data = await EvaluacionesService.resultados(id);
    const reviews = data.intentos.flatMap((attempt) => (attempt.respuestas || []).filter((answer) => answer.requiere_revision).map((answer) => ({ ...answer, estudiante: attempt.estudiante })));
    const summary = data.intentos.map((attempt) => `<div><strong>${escapeHtml(attempt.estudiante.Nombres || attempt.estudiante.usuario)}</strong><span>${attempt.estado} / ${attempt.porcentaje}%</span></div>`).join('');
    const grading = reviews.map((answer) => `<article><strong>${escapeHtml(answer.estudiante.Nombres || answer.estudiante.usuario)}</strong><p>${escapeHtml(answer.pregunta.enunciado)}</p><blockquote>${escapeHtml(answer.respuesta_texto || 'Sin respuesta')}</blockquote><div><input id="grade-score-${answer.id}" class="form-control" type="number" min="0" max="${answer.pregunta.puntaje}" value="${answer.puntaje_obtenido ?? 0}"><input id="grade-feedback-${answer.id}" class="form-control" placeholder="Retroalimentacion" value="${escapeHtml(answer.retroalimentacion || '')}"><button class="btn btn-sm btn-gold" onclick="gradeManualAnswer(${answer.id})">Guardar nota</button></div></article>`).join('');

  } catch(error) { Swal.fire('No se pudieron cargar resultados', error.message, 'error'); }
}
async function gradeManualAnswer(id) { try { await EvaluacionesService.calificarRespuesta(id,{puntaje:Number(document.getElementById(`grade-score-${id}`).value),retroalimentacion:document.getElementById(`grade-feedback-${id}`).value}); toastSuccess('Respuesta calificada'); Swal.close(); } catch(error){ Swal.fire('No se pudo calificar',error.message,'error'); } }

async function takeEvaluation(id) { try { const data = await EvaluacionesService.iniciar(id); AppState.currentAttempt = data; const evaluation = data.evaluacion; document.getElementById('takeEvaluationTitle').textContent = evaluation.titulo; document.getElementById('takeEvaluationMeta').textContent = `${evaluation.curso.nombre} / Intento ${data.intento.numero_intento} de ${evaluation.intentos_permitidos}`; document.getElementById('takeEvaluationBody').innerHTML = evaluation.preguntas.map((question,index) => `<article class="take-question" data-question-id="${question.id}" data-question-type="${question.tipo}"><div class="take-question-heading"><span>${index+1}</span><div><h3>${escapeHtml(question.enunciado)}</h3><small>${question.puntaje} punto(s)</small></div></div>${renderStudentQuestion(question)}</article>`).join(''); AppState.takeEvaluationModal.show(); } catch(error){ Swal.fire('No se pudo iniciar',error.message,'error'); } }

  const tbody = document.getElementById('usersTableBody');

  const users = AppState.usuarios.filter((user) => {
    const text = [user.DNI, user.Nombres, user.Correo, user.Cargo, user.Campaña, user.usuario, user.rol && user.rol.nombre].join(' ').toLowerCase();

      <td>${escapeHtml(user.Nombres || '')}</td>

      <td>${escapeHtml(user.Campaña || '')}</td>
      <td><span class="badge ${user.Estado === 'Activo' ? 'text-bg-success' : 'text-bg-secondary'}">${escapeHtml(user.Estado || '')}</span></td>
      <td>${escapeHtml(user.usuario || '')}</td>
      <td>${escapeHtml(user.rol ? user.rol.nombre : '')}</td>
      <td><span class="badge ${user.tipo_plan === 'Pagado' ? 'plan-badge-paid' : 'badge-soft'}">${escapeHtml(user.tipo_plan || 'Gratuito')}</span></td>

async function handleSaveUser(event) {
  event.preventDefault();
  const id = document.getElementById('userId').value;
  const payload = {
    DNI: document.getElementById('fieldDNI').value.trim(),
    Nombres: document.getElementById('fieldNombres').value.trim(),
    Correo: document.getElementById('fieldCorreo').value.trim(),
    Cargo: document.getElementById('fieldCargo').value.trim(),
    Campaña: document.getElementById('fieldCampana').value.trim(),
    Supervisor: document.getElementById('fieldSupervisor').value.trim(),
    Estado: document.getElementById('fieldEstado').value,
    fecha_ingreso: document.getElementById('fieldFechaIngreso').value,
    usuario: document.getElementById('fieldUsuario').value.trim(),
    rol_id: Number(document.getElementById('fieldRol').value),
    tipo_plan: document.getElementById('fieldTipoPlan').value,
  };

  const password = document.getElementById('fieldPassword').value;
  if (password) payload.password = password;

  try {
    const savedUser = id ? await UsuariosService.actualizar(id, payload) : await UsuariosService.crear(payload);
    const courseIds = Array.from(document.getElementById('fieldAssignedCourses').selectedOptions).map((option) => Number(option.value));
    await UsuariosService.guardarAsignaciones(savedUser.id, courseIds);

    AppState.userModal.hide();
    await loadUsers();
    Swal.fire({ toast: true, position: 'top-end', timer: 2200, showConfirmButton: false, icon: 'success', title: 'Usuario guardado' });
  } catch (error) {
    Swal.fire('No se pudo guardar', error.message, 'error');
  }
}

async function confirmDeleteUser(id) {
  const result = await Swal.fire({
    title: 'Eliminar usuario',
    text: 'Esta accion no se puede deshacer.',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Eliminar',
    cancelButtonText: 'Cancelar',
  });

  if (!result.isConfirmed) return;

  try {
    await UsuariosService.eliminar(id);
    await loadUsers();
    Swal.fire({ toast: true, position: 'top-end', timer: 2200, showConfirmButton: false, icon: 'success', title: 'Usuario eliminado' });
  } catch (error) {
    Swal.fire('No se pudo eliminar', error.message, 'error');
  }
}

function exportUsersCsv() {
  const headers = ['DNI', 'Nombres', 'Correo', 'Cargo', 'Campana', 'Supervisor', 'Estado', 'Fecha ingreso', 'Usuario', 'Rol', 'Plan'];
  const rows = AppState.usuarios.map((user) => [
    user.DNI,
    user.Nombres,
    user.Correo,
    user.Cargo,
    user.Campaña,
    user.Supervisor,
    user.Estado,
    user.fecha_ingreso,
    user.usuario,
    user.rol ? user.rol.nombre : '',
    user.tipo_plan || 'Gratuito',
  ]);

  const csv = [headers, ...rows].map((row) => row.map((cell) => `"${String(cell || '').replaceAll('"', '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'usuarios-an-academy.csv';
  link.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

  const courses = AppState.cursos.filter((curso) => {
    const text = [curso.nombre, curso.descripcion_corta, curso.categoria, curso.campana_area].join(' ').toLowerCase();
    return (!search || text.includes(search)) && (!status || curso.estado === status) && (!category || String(curso.categoria || '').toLowerCase().includes(category));
  });
  const tbody = document.getElementById('coursesTableBody');
  const canManage = canManageCourses();
  document.querySelector('#coursesListPanel .eyebrow').textContent = canManage ? 'ADMINISTRACION ACADEMICA' : 'MI APRENDIZAJE';

  if (!courses.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-secondary">${canManage ? 'No hay cursos para mostrar.' : 'Aun no tienes cursos asignados.'}</td></tr>`;

    <tr>

      <td>${curso.cantidad_modulos || 0}</td>
      <td><span class="badge ${courseStatusClass(curso.estado)}">${escapeHtml(curso.estado)}</span></td>
      <td>${formatDate(curso.created_at)}</td>
      <td class="text-end text-nowrap">${canManage ? `
        <button class="btn btn-outline-light btn-sm" title="Ver" onclick="openCourseEditor(${curso.id})"><i class="fa-solid fa-eye"></i></button>
        <button class="btn btn-outline-warning btn-sm" title="Editar" onclick="openEditCourseModal(${curso.id})"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-outline-info btn-sm" title="Duplicar" onclick="duplicateCourse(${curso.id})"><i class="fa-solid fa-copy"></i></button>

        <button class="btn btn-outline-secondary btn-sm" title="Desactivar" onclick="setCourseStatus(${curso.id}, 'Inactivo')"><i class="fa-solid fa-ban"></i></button>
        <button class="btn btn-outline-danger btn-sm" title="Eliminar" onclick="deleteCourse(${curso.id})"><i class="fa-solid fa-trash"></i></button>
      ` : `<button class="btn btn-gold btn-sm" onclick="openCourseEditor(${curso.id})"><i class="fa-solid fa-play me-2"></i>Continuar curso</button>`}</td>
    </tr>
  `).join('');

function courseStatusClass(status) {
  if (status === 'Publicado') return 'text-bg-success';
  if (status === 'Inactivo') return 'text-bg-secondary';
  return 'text-bg-warning';
}

}

async function saveCourse(event) {
  event.preventDefault();
  const id = document.getElementById('courseId').value;
  try {
    const curso = id ? await CursosService.actualizar(id, getCoursePayload()) : await CursosService.crear(getCoursePayload());
    AppState.courseModal.hide();
    await loadCourses();
    if (AppState.cursoActual && Number(id) === AppState.cursoActual.id) await openCourseEditor(curso.id);
    toastSuccess('Curso guardado');
  } catch (error) { Swal.fire('No se pudo guardar', error.message, 'error'); }
}

async function openCourseEditor(id) {
  if (!canManageCourses()) {
    showView('student-courses');
    Swal.fire('Acceso restringido', 'No tienes permisos para acceder al editor de cursos.', 'warning');
    return;
  }
  try {
    AppState.cursoActual = await CursosService.obtener(id);
    document.getElementById('coursesListPanel').classList.add('d-none');
    document.getElementById('courseEditorPanel').classList.remove('d-none');
    document.getElementById('editorCourseName').textContent = AppState.cursoActual.nombre;
    document.getElementById('openModuleModal').classList.toggle('d-none', !canManageCourses());
    document.getElementById('editCurrentCourse').classList.toggle('d-none', !canManageCourses());
    document.getElementById('publishCurrentCourse').classList.toggle('d-none', !canManageCourses());
    document.getElementById('previewCourse').classList.toggle('d-none', !canManageCourses());
    document.getElementById('assignCourseStudents').classList.toggle('d-none', !(AppState.usuario && AppState.usuario.rol && AppState.usuario.rol.nombre === 'Administrador'));
    document.getElementById('courseInfoSummary').innerHTML = `
      <div class="row g-4 align-items-center">
        ${AppState.cursoActual.imagen_portada_url ? `<div class="col-md-3"><img class="course-cover" src="${escapeHtml(AppState.cursoActual.imagen_portada_url)}" alt="Portada"></div>` : ''}
        <div class="col"><div class="d-flex gap-2 mb-2"><span class="badge ${courseStatusClass(AppState.cursoActual.estado)}">${escapeHtml(AppState.cursoActual.estado)}</span><span class="badge badge-soft">${escapeHtml(AppState.cursoActual.categoria || 'Sin categoria')}</span></div><p>${escapeHtml(AppState.cursoActual.descripcion_completa || AppState.cursoActual.descripcion_corta || 'Sin descripcion')}</p><small class="text-secondary">Duracion estimada: ${AppState.cursoActual.duracion_estimada_min || 0} minutos</small></div>
      </div>`;
    renderModulesEditor();
  } catch (error) { Swal.fire('No se pudo cargar el curso', error.message, 'error'); }
}

function closeCourseEditor() {
  AppState.cursoActual = null;
  document.getElementById('courseEditorPanel').classList.add('d-none');
  document.getElementById('coursesListPanel').classList.remove('d-none');
  loadCourses();
}

function renderModulesEditor() {
  const container = document.getElementById('modulesEditor');
  const modulos = AppState.cursoActual.modulos || [];
  if (!modulos.length) { container.innerHTML = '<div class="empty-state">Este curso todavia no tiene modulos.</div>'; return; }
  if (!canManageCourses()) {
    AppState.studentLessons = modulos.flatMap((modulo) => modulo.lecciones.map((leccion) => ({ ...leccion, modulo_nombre: modulo.nombre })));
    container.innerHTML = modulos.map((modulo, index) => `
      <article class="module-editor-card mb-3"><div class="module-editor-header"><div><div class="text-secondary small">Modulo ${index + 1}</div><h3 class="h5 mb-1">${escapeHtml(modulo.nombre)}</h3><small class="text-secondary">${modulo.lecciones.length} pasos · ${modulo.duracion_estimada_min || 0} min</small></div></div>
      <div class="lesson-list">${modulo.lecciones.map((leccion) => { const lessonIndex = AppState.studentLessons.findIndex((item) => item.id === leccion.id); return `<button class="student-lesson-link" type="button" onclick="openStudentLesson(${lessonIndex})"><span class="lesson-order">${lessonIndex + 1}</span><span class="flex-grow-1 text-start"><strong>${escapeHtml(leccion.titulo)}</strong><small>${escapeHtml(leccion.tipo_contenido)} · ${leccion.tiempo_estimado_min || 0} min</small></span>${leccion.progreso && leccion.progreso.completado ? '<i class="fa-solid fa-circle-check text-success"></i>' : '<i class="fa-solid fa-chevron-right"></i>'}</button>`; }).join('')}</div></article>`).join('');
    return;
  }
  container.innerHTML = modulos.map((modulo, index) => `
    <article class="module-editor-card mb-3">
      <div class="module-editor-header">
        <div><div class="text-secondary small">Modulo ${index + 1}</div><h3 class="h5 mb-1">${escapeHtml(modulo.nombre)}</h3><small class="text-secondary">${modulo.lecciones.length} pasos · ${moduleActivities(modulo.id).filter((item)=>item.tipo_actividad==='Evaluacion').length} evaluaciones · ${moduleActivities(modulo.id).filter((item)=>item.tipo_actividad==='Foro').length} foros · ${modulo.duracion_estimada_min || 0} min · ${escapeHtml(modulo.estado)}</small></div>
        <div class="d-flex flex-wrap gap-1">
          <button class="btn btn-outline-light btn-sm" onclick="moveModule(${modulo.id}, 'up')"><i class="fa-solid fa-arrow-up"></i></button>
          <button class="btn btn-outline-light btn-sm" onclick="moveModule(${modulo.id}, 'down')"><i class="fa-solid fa-arrow-down"></i></button>
          <button class="btn btn-outline-warning btn-sm" onclick="openEditModuleModal(${modulo.id})"><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-outline-danger btn-sm" onclick="deleteModule(${modulo.id})"><i class="fa-solid fa-trash"></i></button>
          <button class="btn btn-gold btn-sm" onclick="openCreateLessonModal(${modulo.id})"><i class="fa-solid fa-plus me-1"></i>Agregar paso</button>
          <button class="btn btn-outline-info btn-sm" onclick="openModuleEvaluationModal(${modulo.id})"><i class="fa-solid fa-clipboard-check me-1"></i>Agregar evaluacion</button>
          <button class="btn btn-outline-info btn-sm" onclick="openModuleForumModal(${modulo.id})"><i class="fa-solid fa-comments me-1"></i>Agregar foro</button>
        </div>
      </div>
      <div class="lesson-list">${renderLessons(modulo)}</div>
    </article>`).join('');
}

function moduleActivities(moduleId) { return (AppState.cursoActual.actividades || []).filter((item) => Number(item.modulo_id) === Number(moduleId)); }
function moduleSequence(modulo) { return [...(modulo.lecciones || []).map((item) => ({ ...item, sequenceType: 'lesson' })), ...moduleActivities(modulo.id).map((item) => ({ ...item, sequenceType: item.tipo_actividad === 'Foro' ? 'forum' : 'evaluation' }))].sort((a,b) => Number(a.orden || 0) - Number(b.orden || 0)); }
function renderLessons(modulo) {
  const items = moduleSequence(modulo);
  if (!items.length) return '<div class="text-secondary p-3">Sin pasos, evaluaciones ni foros.</div>';
  return items.map((item, index) => item.sequenceType === 'evaluation' ? `
    <div class="lesson-row evaluation-sequence-row">
      <div class="lesson-order">${index + 1}</div><div class="flex-grow-1"><div class="fw-semibold"><i class="fa-solid fa-clipboard-check text-info me-2"></i>Evaluacion: ${escapeHtml(item.titulo)}</div><small class="text-secondary">Evaluacion · ${item.cantidad_preguntas || 0} preguntas · ${escapeHtml(item.estado)}${item.obligatoria ? ' · Obligatoria' : ''}</small></div>
      <div class="text-nowrap"><button class="btn btn-outline-light btn-sm" title="Subir" onclick="moveEvaluation(${item.id}, 'up')"><i class="fa-solid fa-arrow-up"></i></button> <button class="btn btn-outline-light btn-sm" title="Bajar" onclick="moveEvaluation(${item.id}, 'down')"><i class="fa-solid fa-arrow-down"></i></button> <button class="btn btn-outline-warning btn-sm" title="Editar evaluacion y preguntas" onclick="openEvaluationModal(${item.id}, {courseId:${AppState.cursoActual.id},moduleId:${modulo.id}})"><i class="fa-solid fa-pen"></i></button> <button class="btn btn-outline-info btn-sm" title="Ver respuestas y resultados" onclick="showEvaluationResults(${item.id})"><i class="fa-solid fa-chart-column"></i></button> <button class="btn btn-outline-danger btn-sm" title="Eliminar" onclick="deleteModuleEvaluation(${item.id})"><i class="fa-solid fa-trash"></i></button></div>
    </div>` : item.sequenceType === 'forum' ? `
    <div class="lesson-row forum-sequence-row">
      <div class="lesson-order">${index + 1}</div><div class="flex-grow-1"><div class="fw-semibold"><i class="fa-solid fa-comments text-info me-2"></i>Foro: ${escapeHtml(item.titulo)}</div><small class="text-secondary">Foro evaluable · ${item.cantidad_respuestas || 0} respuestas · ${escapeHtml(item.estado)}${item.obligatorio ? ' · Obligatorio' : ''}</small></div>
      <div class="text-nowrap"><button class="btn btn-outline-light btn-sm" title="Subir" onclick="moveForum(${item.id}, 'up')"><i class="fa-solid fa-arrow-up"></i></button> <button class="btn btn-outline-light btn-sm" title="Bajar" onclick="moveForum(${item.id}, 'down')"><i class="fa-solid fa-arrow-down"></i></button> <button class="btn btn-outline-warning btn-sm" title="Editar foro" onclick="openForumModal(${item.id}, {courseId:${AppState.cursoActual.id},moduleId:${modulo.id}})"><i class="fa-solid fa-pen"></i></button> <button class="btn btn-outline-info btn-sm" title="Ver y calificar respuestas" onclick="showForumResults(${item.id})"><i class="fa-solid fa-star"></i></button> <button class="btn btn-outline-danger btn-sm" title="Eliminar" onclick="deleteModuleForum(${item.id})"><i class="fa-solid fa-trash"></i></button></div>
    </div>` : `
    <div class="lesson-row">
      <div class="lesson-order">${index + 1}</div><div class="flex-grow-1"><div class="fw-semibold">Paso: ${escapeHtml(item.titulo)}</div><small class="text-secondary">${escapeHtml(item.tipo_contenido)} · ${item.tiempo_estimado_min || 0} min · ${escapeHtml(item.estado)}</small></div>
      <div class="text-nowrap"><button class="btn btn-outline-light btn-sm" onclick="moveLesson(${item.id}, 'up')"><i class="fa-solid fa-arrow-up"></i></button> <button class="btn btn-outline-light btn-sm" onclick="moveLesson(${item.id}, 'down')"><i class="fa-solid fa-arrow-down"></i></button> <button class="btn btn-outline-warning btn-sm" onclick="openEditLessonModal(${item.id})"><i class="fa-solid fa-pen"></i></button> <button class="btn btn-outline-danger btn-sm" onclick="deleteLesson(${item.id})"><i class="fa-solid fa-trash"></i></button></div>
    </div>`).join('');
}

function openModuleEvaluationModal(moduleId) { openEvaluationModal(null, { courseId: AppState.cursoActual.id, moduleId }); }
function openModuleForumModal(moduleId) { openForumModal(null, { courseId: AppState.cursoActual.id, moduleId }); }
async function moveEvaluation(id, direction) { try { await EvaluacionesService.ordenar(id, direction); await openCourseEditor(AppState.cursoActual.id); } catch (error) { Swal.fire('No se pudo ordenar', error.message, 'error'); } }
async function moveForum(id, direction) { try { await EvaluacionesService.ordenarForo(id, direction); await openCourseEditor(AppState.cursoActual.id); } catch (error) { Swal.fire('No se pudo ordenar', error.message, 'error'); } }
async function deleteModuleEvaluation(id) { if (!(await confirmAction('Eliminar evaluacion','Se eliminaran preguntas e intentos asociados.'))) return; try { await EvaluacionesService.eliminar(id); await openCourseEditor(AppState.cursoActual.id); } catch(error){ Swal.fire('No se pudo eliminar',error.message,'error'); } }
async function deleteModuleForum(id) { if (!(await confirmAction('Eliminar foro','Se eliminaran sus respuestas y calificaciones.'))) return; try { await EvaluacionesService.eliminarForo(id); await openCourseEditor(AppState.cursoActual.id); } catch(error){ Swal.fire('No se pudo eliminar',error.message,'error'); } }

function openCreateModuleModal() {
  document.getElementById('moduleModalTitle').textContent = 'Agregar modulo'; document.getElementById('moduleForm').reset(); document.getElementById('moduleId').value = ''; document.getElementById('moduleStatus').value = 'Borrador'; AppState.moduleModal.show();
}

function openEditModuleModal(id) {
  const modulo = AppState.cursoActual.modulos.find((item) => item.id === id); if (!modulo) return;
  document.getElementById('moduleModalTitle').textContent = 'Editar modulo'; document.getElementById('moduleId').value = modulo.id; document.getElementById('moduleName').value = modulo.nombre; document.getElementById('moduleDescription').value = modulo.descripcion || ''; document.getElementById('moduleDuration').value = modulo.duracion_estimada_min || 0; document.getElementById('moduleStatus').value = modulo.estado; AppState.moduleModal.show();
}

async function saveModule(event) {
  event.preventDefault(); const id = document.getElementById('moduleId').value; const payload = { curso_id: AppState.cursoActual.id, nombre: document.getElementById('moduleName').value.trim(), descripcion: document.getElementById('moduleDescription').value.trim(), duracion_estimada_min: Number(document.getElementById('moduleDuration').value || 0), estado: document.getElementById('moduleStatus').value };
  try { if (id) await CursosService.actualizarModulo(id, payload); else await CursosService.crearModulo(payload); AppState.moduleModal.hide(); await openCourseEditor(AppState.cursoActual.id); toastSuccess('Modulo guardado'); } catch (error) { Swal.fire('No se pudo guardar', error.message, 'error'); }
}

async function moveModule(id, direction) { try { await CursosService.ordenarModulo(id, direction); await openCourseEditor(AppState.cursoActual.id); } catch (error) { Swal.fire('No se pudo ordenar', error.message, 'error'); } }
async function deleteModule(id) { if (!(await confirmAction('Eliminar modulo', 'Tambien se eliminaran sus pasos y recursos.'))) return; try { await CursosService.eliminarModulo(id); await openCourseEditor(AppState.cursoActual.id); } catch (error) { Swal.fire('No se pudo eliminar', error.message, 'error'); } }

function openCreateLessonModal(moduloId) {
  document.getElementById('lessonModalTitle').textContent = 'Agregar paso'; document.getElementById('lessonForm').reset(); document.getElementById('lessonId').value = ''; document.getElementById('lessonModuleId').value = moduloId; document.getElementById('lessonType').value = 'Texto'; document.getElementById('lessonStatus').value = 'Borrador'; renderLessonTypeFields(); AppState.lessonModal.show();
}

function findLesson(id) { for (const modulo of AppState.cursoActual.modulos) { const leccion = modulo.lecciones.find((item) => item.id === id); if (leccion) return leccion; } return null; }
function openEditLessonModal(id) {
  const leccion = findLesson(id); if (!leccion) return;
  document.getElementById('lessonModalTitle').textContent = 'Editar paso'; document.getElementById('lessonId').value = leccion.id; document.getElementById('lessonModuleId').value = leccion.modulo_id; document.getElementById('lessonTitle').value = leccion.titulo || ''; document.getElementById('lessonType').value = leccion.tipo_contenido; document.getElementById('lessonDescription').value = leccion.descripcion || ''; document.getElementById('lessonText').value = leccion.contenido_texto || ''; document.getElementById('lessonUrl').value = leccion.url_externa || ''; document.getElementById('lessonUrlType').value = leccion.tipo_url || 'otro'; document.getElementById('lessonNewTab').checked = leccion.abrir_nueva_pestana; document.getElementById('lessonEmbedded').checked = leccion.mostrar_embebido; document.getElementById('lessonHtml').value = leccion.contenido_html || ''; document.getElementById('lessonDuration').value = leccion.tiempo_estimado_min || 0; document.getElementById('lessonRequirement').value = leccion.requisito_avance || 'Libre'; document.getElementById('lessonStatus').value = leccion.estado; renderLessonTypeFields(); AppState.lessonModal.show();
}

function renderLessonTypeFields() {
  document.querySelectorAll('.lesson-type-fields').forEach((element) => element.classList.add('d-none'));
  const type = document.getElementById('lessonType').value;
  if (type === 'Texto' || type === 'Evaluacion') document.getElementById('lessonTextFields').classList.remove('d-none');
  if (type === 'URL' || type === 'Video') document.getElementById('lessonUrlFields').classList.remove('d-none');
  if (type === 'HTML') document.getElementById('lessonHtmlFields').classList.remove('d-none');
  if (type === 'Archivo') document.getElementById('lessonFileFields').classList.remove('d-none');
}

function getLessonPayload() { return { modulo_id: Number(document.getElementById('lessonModuleId').value), titulo: document.getElementById('lessonTitle').value.trim(), descripcion: document.getElementById('lessonDescription').value.trim(), tipo_contenido: document.getElementById('lessonType').value, contenido_texto: document.getElementById('lessonText').value, contenido_html: document.getElementById('lessonHtml').value, url_externa: document.getElementById('lessonUrl').value.trim() || null, tipo_url: document.getElementById('lessonUrlType').value, abrir_nueva_pestana: document.getElementById('lessonNewTab').checked, mostrar_embebido: document.getElementById('lessonEmbedded').checked, tiempo_estimado_min: Number(document.getElementById('lessonDuration').value || 0), requisito_avance: document.getElementById('lessonRequirement').value, estado: document.getElementById('lessonStatus').value }; }

async function saveLesson(event) {
  event.preventDefault(); const id = document.getElementById('lessonId').value; const payload = getLessonPayload();
  try { const leccion = id ? await CursosService.actualizarLeccion(id, payload) : await CursosService.crearLeccion(payload); const file = document.getElementById('lessonFile').files[0]; if (file) await CursosService.subirArchivo(leccion.id, AppState.cursoActual.id, payload.modulo_id, file); AppState.lessonModal.hide(); await openCourseEditor(AppState.cursoActual.id); toastSuccess('Paso guardado'); } catch (error) { Swal.fire('No se pudo guardar', error.message, 'error'); }
}

async function moveLesson(id, direction) { try { await CursosService.ordenarLeccion(id, direction); await openCourseEditor(AppState.cursoActual.id); } catch (error) { Swal.fire('No se pudo ordenar', error.message, 'error'); } }
async function deleteLesson(id) { if (!(await confirmAction('Eliminar paso', 'Se eliminaran tambien sus recursos.'))) return; try { await CursosService.eliminarLeccion(id); await openCourseEditor(AppState.cursoActual.id); } catch (error) { Swal.fire('No se pudo eliminar', error.message, 'error'); } }

function previewEmbeddedHtml() { const preview = document.getElementById('embeddedHtmlPreview'); preview.innerHTML = document.getElementById('lessonHtml').value; preview.classList.remove('d-none'); }

async function setCourseStatus(id, estado) { try { const curso = AppState.cursos.find((item) => item.id === id) || await CursosService.obtener(id); await CursosService.actualizar(id, { estado }); await loadCourses(); if (AppState.cursoActual && AppState.cursoActual.id === id) await openCourseEditor(id); toastSuccess(`Curso ${estado.toLowerCase()}`); } catch (error) { Swal.fire('No se pudo actualizar', error.message, 'error'); } }
async function publishCurrentCourse() { if (AppState.cursoActual) await setCourseStatus(AppState.cursoActual.id, 'Publicado'); }
async function duplicateCourse(id) { try { await CursosService.duplicar(id); await loadCourses(); toastSuccess('Curso duplicado como borrador'); } catch (error) { Swal.fire('No se pudo duplicar', error.message, 'error'); } }
async function deleteCourse(id) { if (!(await confirmAction('Eliminar curso', 'Se eliminara toda su estructura academica.'))) return; try { await CursosService.eliminar(id); await loadCourses(); toastSuccess('Curso eliminado'); } catch (error) { Swal.fire('No se pudo eliminar', error.message, 'error'); } }

function previewCurrentCourse() {
  const curso = AppState.cursoActual; if (!curso) return;
  AppState.previewMode = true;
  AppState.studentLessons = buildStudentJourney(curso);
  AppState.studentLessonIndex = 0;
  renderStudentCoursePlayer();
  AppState.coursePreviewModal.show();
}

async function openCourseAssignmentModal() {
  if (!AppState.cursoActual) return;
  document.getElementById('assignmentCourseName').textContent = AppState.cursoActual.nombre;
  const container = document.getElementById('courseStudentsList');
  container.innerHTML = '<div class="skeleton"></div>';
  AppState.courseAssignmentModal.show();
  try {
    const students = await CursosService.estudiantesAsignados(AppState.cursoActual.id);
    container.innerHTML = students.length ? students.map((student) => `<label class="course-student-option"><input class="form-check-input course-student-check" type="checkbox" value="${student.id}" ${student.asignado ? 'checked' : ''}><span class="course-student-avatar"><i class="fa-solid fa-user-graduate"></i></span><span><strong>${escapeHtml(student.Nombres || student.usuario)}</strong><small>${escapeHtml(student.Correo || student.usuario || '')} · ${escapeHtml(student.Estado || '')}</small></span></label>`).join('') : '<div class="empty-state">No existen usuarios con rol Estudiante.</div>';
  } catch (error) { container.innerHTML = `<div class="text-warning">${escapeHtml(error.message)}</div>`; }
}

async function saveCourseAssignments() {
  if (!AppState.cursoActual) return;
  const ids = Array.from(document.querySelectorAll('.course-student-check:checked')).map((input) => Number(input.value));
  try {
    await CursosService.asignarEstudiantes(AppState.cursoActual.id, ids);
    AppState.courseAssignmentModal.hide();
    toastSuccess('Estudiantes asignados');
  } catch (error) { Swal.fire('No se pudo asignar el curso', error.message, 'error'); }
}

function renderLessonPreview(leccion) {
  if (leccion.tipo_contenido === 'HTML') return `<div class="responsive-embed">${leccion.contenido_html || ''}</div>`;
  if (leccion.tipo_contenido === 'Texto' || leccion.tipo_contenido === 'Evaluacion') return `<p>${escapeHtml(leccion.contenido_texto || leccion.descripcion || '')}</p>`;
  if ((leccion.tipo_contenido === 'URL' || leccion.tipo_contenido === 'Video') && leccion.url_externa) return leccion.mostrar_embebido ? `<div class="responsive-embed"><iframe src="${escapeHtml(leccion.url_externa)}" loading="lazy"></iframe></div>` : `<a class="btn btn-outline-warning" href="${escapeHtml(leccion.url_externa)}" target="_blank" rel="noopener">Abrir recurso</a>`;
  if (leccion.recursos && leccion.recursos.length) return leccion.recursos.map((recurso) => `<a class="btn btn-outline-light me-2" href="${escapeHtml(recurso.url)}" target="_blank" rel="noopener"><i class="fa-solid fa-download me-2"></i>${escapeHtml(recurso.nombre_original)}</a>`).join('');
  return '<span class="text-secondary">Contenido pendiente.</span>';
}

async function confirmAction(title, text) { const result = await Swal.fire({ title, text, icon: 'warning', showCancelButton: true, confirmButtonText: 'Confirmar', cancelButtonText: 'Cancelar' }); return result.isConfirmed; }
function toastSuccess(title) { Swal.fire({ toast: true, position: 'top-end', timer: 2200, showConfirmButton: false, icon: 'success', title }); }

function canManageCourses() {
  const rol = AppState.usuario && AppState.usuario.rol ? AppState.usuario.rol.nombre : '';
  return rol === 'Administrador' || rol === 'Instructor';
}

function openStudentLesson(index) {
  AppState.studentLessonIndex = index;
  AppState.previewMode = false;
  renderStudentCoursePlayer();
  if (isStudent()) showView('student-course-player');
  else AppState.coursePreviewModal.show();
}

function getStudentPlayerContainer() {
  if (isStudent() && !AppState.previewMode) return document.getElementById('studentCoursePlayerBody');
  return document.getElementById('coursePreviewBody');
}

function renderStudentCoursePlayer() {
  const leccion = AppState.studentLessons[AppState.studentLessonIndex];
  const curso = AppState.cursoActual;
  const container = getStudentPlayerContainer();
  if (!leccion) {
    container.innerHTML = '<div class="empty-state m-4">Este curso todavia no tiene pasos disponibles.</div>';
    return;
  }
  const cover = curso.imagen_portada_url ? `style="background-image:linear-gradient(90deg,rgba(2,13,31,.94),rgba(2,20,42,.55)),url('${escapeHtml(curso.imagen_portada_url)}')"` : '';
  const activityContent = leccion.es_actividad ? renderJourneyActivity(leccion) : `<div class="student-lesson-heading"><div><span>${escapeHtml(leccion.modulo_nombre || '')}</span><h2>${escapeHtml(leccion.titulo)}</h2><p>${escapeHtml(leccion.descripcion || '')}</p></div><span class="badge badge-soft">${escapeHtml(leccion.tipo_contenido)}</span></div><div class="lesson-content">${renderLessonPreview(leccion)}</div>`;
  container.innerHTML = `
    <div class="student-course-player">
      <header class="student-player-cover" ${cover}><div><span class="eyebrow">${AppState.previewMode ? 'VISTA PREVIA' : 'MI CURSO'}</span><h2>${escapeHtml(curso.nombre)}</h2><p>${escapeHtml(curso.descripcion_corta || '')}</p></div><div class="student-player-progress"><strong>${AppState.studentLessonIndex + 1}/${AppState.studentLessons.length}</strong><span>pasos</span></div></header>
      <div class="student-player-layout">
        <aside class="student-player-sidebar"><div class="student-player-sidebar-title">Contenido del curso</div>${renderStudentJourneyOutline()}</aside>
        <main class="student-player-content">
          ${activityContent}
          <div class="student-player-actions"><button class="btn btn-outline-light" ${AppState.studentLessonIndex === 0 ? 'disabled' : ''} onclick="navigateStudentLesson(-1)"><i class="fa-solid fa-arrow-left me-2"></i>Anterior</button>${AppState.previewMode ? '<span class="preview-mode-label"><i class="fa-solid fa-eye"></i> Navegacion de prueba</span>' : leccion.es_actividad ? `<button class="btn btn-outline-info" onclick="openJourneyActivity(${AppState.studentLessonIndex})"><i class="fa-solid ${leccion.tipo_actividad === 'Foro' ? 'fa-comments' : 'fa-list-check'} me-2"></i>${leccion.completada ? 'Ver actividad' : 'Completar actividad'}</button>` : `<button class="btn btn-outline-success" onclick="completeStudentLesson()"><i class="fa-solid fa-check me-2"></i>${leccion.progreso && leccion.progreso.completado ? 'Completado' : 'Marcar como completado'}</button>`}<button class="btn btn-gold" ${AppState.studentLessonIndex >= AppState.studentLessons.length - 1 || (AppState.studentLessons[AppState.studentLessonIndex + 1] && AppState.studentLessons[AppState.studentLessonIndex + 1].bloqueado) ? 'disabled' : ''} onclick="navigateStudentLesson(1)">Siguiente<i class="fa-solid fa-arrow-right ms-2"></i></button></div>
        </main>
      </div>
    </div>`;
}

function journeyActivityState(activity) { const record=activity.tipo_actividad==='Foro'?activity.respuesta:activity.intento;if(activity.completada)return{label:activity.tipo_actividad==='Evaluacion'&&record&&record.estado==='Aprobado'?'Aprobada':'Completado',className:'text-success',icon:'fa-circle-check',message:''};if(record&&((activity.tipo_actividad==='Evaluacion'&&record.estado==='PendienteCalificacion')||(activity.tipo_actividad==='Foro'&&record.estado!=='Calificado'&&activity.condicion_desbloqueo!=='Responder')))return{label:'Pendiente de calificacion',className:'text-warning',icon:'fa-clock',message:activity.tipo_actividad==='Foro'?'Tu respuesta esta pendiente de revision por el instructor.':'Tu evaluacion esta pendiente de revision por el instructor.'};if(activity.tipo_actividad==='Evaluacion'&&record&&record.estado==='Desaprobado')return{label:'Desaprobada',className:'text-danger',icon:'fa-circle-xmark',message:activity.bloquea_avance?'Debes aprobar esta evaluacion para continuar.':''};return{label:activity.bloqueado?'Bloqueado':'Disponible',className:activity.bloqueado?'text-warning':'text-info',icon:activity.bloqueado?'fa-lock':'fa-circle-play',message:activity.bloquea_avance?(activity.mensaje_bloqueo||(activity.tipo_actividad==='Foro'?'Debes completar este foro para continuar.':'Debes completar esta evaluacion para continuar.')):''}; }
function renderJourneyActivity(activity) { const state=journeyActivityState(activity);return `<div class="journey-activity ${activity.completada ? 'completed' : ''}"><div class="journey-activity-icon"><i class="fa-solid ${activity.tipo_actividad === 'Foro' ? 'fa-comments' : 'fa-clipboard-check'}"></i></div><div><span class="eyebrow">${activity.tipo_actividad === 'Foro' ? 'FORO EVALUABLE' : 'EVALUACION'}${activity.obligatoria||activity.obligatorio ? ' / OBLIGATORIA' : ''}</span><h2>${escapeHtml(activity.titulo)}</h2><p>${escapeHtml(activity.descripcion || activity.instrucciones || '')}</p><span class="${state.className}"><i class="fa-solid ${state.icon} me-2"></i>${state.label}</span>${state.message?`<p class="mt-2 mb-0 ${state.className}">${escapeHtml(state.message)}</p>`:''}</div></div>`; }
function openJourneyActivity(index) { const activity = AppState.studentLessons[index]; if (!activity || !activity.es_actividad) return; AppState.coursePreviewModal.hide(); if (activity.tipo_actividad === 'Foro') { AppState.foros = [activity]; openForumResponse(activity.id); } else takeEvaluation(activity.id); }

function renderStudentCourseOutline() {
  let lastModule = '';
  return AppState.studentLessons.map((lesson, index) => {
    const moduleTitle = lesson.modulo_nombre || 'Modulo';
    const heading = moduleTitle !== lastModule ? `<div class="student-outline-module">${escapeHtml(moduleTitle)}</div>` : '';
    lastModule = moduleTitle;
    return `${heading}<button class="student-outline-step ${index === AppState.studentLessonIndex ? 'active' : ''}" type="button" onclick="selectStudentLesson(${index})"><span>${index + 1}</span><div><strong>${escapeHtml(lesson.titulo)}</strong><small>${escapeHtml(lesson.tipo_contenido)} · ${lesson.tiempo_estimado_min || 0} min</small></div>${lesson.progreso && lesson.progreso.completado ? '<i class="fa-solid fa-circle-check"></i>' : ''}</button>`;
  }).join('');
}

function renderStudentJourneyOutline() {
  let lastModule = '';
  return AppState.studentLessons.map((item, index) => {
    const moduleTitle = item.modulo_nombre || 'Modulo';
    const heading = moduleTitle !== lastModule ? `<div class="student-outline-module">${escapeHtml(moduleTitle)}</div>` : '';
    lastModule = moduleTitle;
    const completed = item.completada || (item.progreso && item.progreso.completado);
    const type = item.es_actividad ? item.tipo_actividad : `${item.tipo_contenido} / ${item.tiempo_estimado_min || 0} min`;
    return `${heading}<button class="student-outline-step ${index === AppState.studentLessonIndex ? 'active' : ''} ${item.bloqueado ? 'locked' : ''}" type="button" onclick="selectStudentLesson(${index})"><span>${item.bloqueado ? '<i class="fa-solid fa-lock"></i>' : index + 1}</span><div><strong>${escapeHtml(item.titulo)}</strong><small>${escapeHtml(type)}</small></div>${completed ? '<i class="fa-solid fa-circle-check"></i>' : ''}</button>`;
  }).join('');
}

function selectStudentLesson(index) { if (AppState.studentLessons[index].bloqueado) { Swal.fire('Contenido bloqueado', 'Debes completar la actividad obligatoria anterior para continuar.', 'warning'); return; } AppState.studentLessonIndex = index; renderStudentCoursePlayer(); }

function navigateStudentLesson(offset) { const target = AppState.studentLessonIndex + offset; if (AppState.studentLessons[target] && AppState.studentLessons[target].bloqueado) { Swal.fire('Contenido bloqueado', 'Debes completar la actividad obligatoria anterior para continuar.', 'warning'); return; } AppState.studentLessonIndex = target; renderStudentCoursePlayer(); }
async function completeStudentLesson() { const leccion = AppState.studentLessons[AppState.studentLessonIndex]; try { await CursosService.completarLeccion(leccion.id); leccion.progreso = { completado: true }; renderStudentCoursePlayer(); if (isStudent()) await loadStudentCourses(); toastSuccess('Paso completado'); } catch (error) { Swal.fire('No se pudo registrar el avance', error.message, 'error'); } }
</script>
