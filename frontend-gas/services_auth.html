<script>
const AuthService = {
  async login(usuario, password, rememberMe = false) {
    const result = await ApiService.request('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ usuario, password, rememberMe }),
    });

    ApiService.setSession(result.token, result.usuario);
    return result.usuario;
  },

  async me() {
    const result = await ApiService.request('/api/auth/me');
    ApiService.setSession(ApiService.getToken(), result.usuario);
    return result.usuario;
  },

  async registerPublic(payload) {
    const result = await ApiService.request('/api/auth/register-public', {
      method: 'POST',
      body: JSON.stringify(payload),
    });

    ApiService.setSession(result.token, result.usuario);
    return result.usuario;
  },

  async requestMagicLink(payload) {
    const result = await ApiService.request('/api/auth/magic-link', {
      method: 'POST',
      body: JSON.stringify(payload),
    });

    return result.data;
  },

  async completeMagicLink(accessToken, cursoId = null) {
    const result = await ApiService.request('/api/auth/magic-session', {
      method: 'POST',
      body: JSON.stringify({ access_token: accessToken, curso_id: cursoId }),
    });

    ApiService.setSession(result.token, result.usuario);
    return result.usuario;
  },

  async googleConfig() {
    const result = await ApiService.request('/api/auth/google/config');
    return result.data;
  },

  async loginGoogle(credential, cursoId = null) {
    const result = await ApiService.request('/api/auth/google', {
      method: 'POST',
      body: JSON.stringify({ credential, curso_id: cursoId, rememberMe: true }),
    });

    ApiService.setSession(result.token, result.usuario);
    return result.usuario;
  },

  async changePassword(currentPassword, newPassword) {
    const result = await ApiService.request('/api/auth/change-password', {
      method: 'PUT',
      body: JSON.stringify({ currentPassword, newPassword }),
    });

    ApiService.setSession(ApiService.getToken(), result.usuario);
    return result.usuario;
  },

  logout() {
    ApiService.clearSession();
  },
};
</script>
