<style>
  :root {
    --bg: #071426;
    --bg-deep: #040d1c;
    --panel: rgba(26, 37, 66, 0.9);
    --panel-2: #0e1a35;
    --line: rgba(76, 201, 240, 0.18);
    --line-strong: rgba(76, 201, 240, 0.38);
    --text: #f5f7fa;
    --muted: #aab4c0;
    --disabled: #6f7a8a;
    --gold: #f5a400;
    --gold-dark: #b87900;
    --cyan: #00d8ff;
    --turquoise: #00d8ff;
    --electric: #1f6bff;
    --navy: #06152f;
    --gradient: linear-gradient(135deg, #00d8ff 0%, #1f6bff 100%);
    --shadow: 0 20px 50px rgba(0, 6, 24, 0.36);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 82% 8%, rgba(22, 119, 255, 0.16), transparent 28%),
      radial-gradient(circle at 16% 85%, rgba(33, 230, 182, 0.09), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: "Manrope", system-ui, sans-serif;
  }

  h1, h2, h3, h4, h5, h6, .fw-bold { font-family: "Space Grotesk", "Manrope", sans-serif; }

  .login-screen {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      linear-gradient(rgba(3, 11, 28, 0.78), rgba(2, 7, 20, 0.92)),
      radial-gradient(circle at 15% 20%, rgba(33, 230, 182, 0.25), transparent 30%),
      radial-gradient(circle at 84% 24%, rgba(22, 119, 255, 0.28), transparent 32%),
      linear-gradient(145deg, #020714, #071c3d 58%, #020b1e);
  }

  .login-panel {
    width: min(100%, 470px);
    border: 1px solid var(--line-strong);
    background: linear-gradient(155deg, rgba(10, 31, 62, 0.94), rgba(4, 14, 35, 0.96));
    border-radius: 28px;
    padding: 38px;
    box-shadow: 0 30px 90px rgba(0, 4, 18, 0.62), 0 0 55px rgba(37, 217, 232, 0.08);
    backdrop-filter: blur(22px);
  }

  .brand-mark {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: #111;
    background: var(--gold);
    font-weight: 900;
    letter-spacing: 0;
  }

  .brand-logo { display: block; max-width: 100%; height: auto; object-fit: contain; }
  .brand-logo[src=""], .brand-logo:not([src]) { display: none; }
  .brand-logo-login { width: min(250px, 76%); max-height: 105px; margin: 0 auto; }
  .brand-logo-shell { width: 52px; height: 52px; padding: 6px; display: grid; place-items: center; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 15px; background: rgba(255,255,255,0.04); }
  .brand-logo-shell::after { content: "IA"; grid-area: 1 / 1; color: var(--cyan); font-family: "Space Grotesk"; font-weight: 800; }
  .brand-logo-shell .brand-logo { max-height: 38px; }
  .brand-logo-shell .brand-logo { grid-area: 1 / 1; position: relative; z-index: 1; }
  .brand-logo-header { width: 44px; max-height: 36px; }
  .dashboard-logo { width: min(260px, 30vw); max-height: 100px; }
  .section-logo { width: 74px; max-height: 54px; padding: 6px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); }
  .footer-logo { width: 100px; max-height: 36px; opacity: 0.8; }
  .login-tagline { color: var(--cyan); font-weight: 700; letter-spacing: -0.01em; }
  .brand-link { color: var(--cyan) !important; text-decoration: none; }

  .form-control,
  .form-select {
    background: rgba(2, 12, 31, 0.72);
    border-color: var(--line);
    color: var(--text);
    border-radius: 12px;
    min-height: 44px;
  }

  .form-control:focus,
  .form-select:focus {
    background: rgba(4, 19, 44, 0.92);
    border-color: var(--cyan);
    color: var(--text);
    box-shadow: 0 0 0 0.2rem rgba(37, 217, 232, 0.14);
  }

  .form-control::placeholder { color: #66809e; }
  .form-select option { background: #07172f; color: var(--text); }

  .btn-gold {
    background: var(--gradient);
    border-color: transparent;
    color: #021024;
    font-weight: 700;
    border-radius: 12px;
    box-shadow: 0 10px 26px rgba(22, 119, 255, 0.22);
  }

  .btn-gold:hover {
    background: linear-gradient(135deg, #50f3ce, #3ae4ef 44%, #398eff);
    border-color: transparent;
    color: #020b1c;
    transform: translateY(-1px);
  }

  .btn { border-radius: 11px; transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease; }
  .btn-outline-brand, .btn-outline-warning { color: var(--cyan); border-color: rgba(37, 217, 232, 0.55); }
  .btn-outline-brand:hover, .btn-outline-warning:hover { color: #031026; background: var(--cyan); border-color: var(--cyan); }
  .btn-outline-light { border-color: rgba(145, 168, 196, 0.42); color: #dcecff; }
  .btn-outline-light:hover { background: rgba(37, 217, 232, 0.1); color: var(--cyan); border-color: var(--cyan); }

  .app-shell {
    min-height: 100vh;
    display: flex;
  }

  .sidebar {
    width: 280px;
    background: linear-gradient(180deg, rgba(6, 21, 47, 0.98), rgba(3, 11, 28, 0.99));
    border-right: 1px solid var(--line);
    transition: width 180ms ease;
    box-shadow: 18px 0 48px rgba(0, 5, 20, 0.2);
  }

  .sidebar.collapsed {
    width: 82px;
  }

  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .brand-copy {
    display: none;
  }

  .sidebar-header {
    min-height: 84px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }

  .side-link {
    width: 100%;
    border: 0;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--muted);
    background: transparent;
    padding: 13px 18px;
    text-align: left;
    transition: background 160ms ease, color 160ms ease;
    border-left: 3px solid transparent;
  }

  .side-link:hover,
  .side-link.active {
    background: linear-gradient(90deg, rgba(37, 217, 232, 0.15), rgba(22, 119, 255, 0.05));
    color: var(--text);
    border-left-color: var(--cyan);
  }

  .side-link.active i { color: var(--cyan); filter: drop-shadow(0 0 8px rgba(37, 217, 232, 0.5)); }

  .side-link i {
    width: 22px;
    text-align: center;
  }

  .workspace {
    min-width: 0;
    flex: 1;
    background: transparent;
  }

  .topbar {
    min-height: 84px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(4, 14, 35, 0.84);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(18px);
  }

  .content-wrap {
    padding: 28px;
    min-height: calc(100vh - 146px);
  }

  .view { display: none; }
  .view.active { display: block; }

  .metric-card,
  .data-panel,
  .course-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .metric-card {
    padding: 21px;
    position: relative;
    overflow: hidden;
  }

  .metric-card::after { content: ""; position: absolute; inset: auto -24px -34px auto; width: 95px; height: 95px; border-radius: 50%; background: radial-gradient(circle, rgba(37,217,232,0.16), transparent 68%); }

  .metric-label {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .metric-value {
    font-size: 1.9rem;
    font-weight: 800;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .data-panel {
    padding: 24px;
  }

  .table {
    --bs-table-bg: transparent;
    --bs-table-color: var(--text);
    --bs-table-border-color: var(--line);
  }

  .table thead th {
    color: var(--muted);
    font-weight: 600;
  }

  .badge-soft {
    background: rgba(37, 217, 232, 0.1);
    color: var(--cyan);
    border: 1px solid rgba(37, 217, 232, 0.28);
  }

  .skeleton {
    min-height: 18px;
    border-radius: 6px;
    background: linear-gradient(90deg, #0b2143, #123966, #0b2143);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    to { background-position-x: -200%; }
  }

  .course-cover,
  .preview-cover {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid var(--line);
  }

  .module-editor-card,
  .preview-module {
    overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }

  .module-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px;
    border-bottom: 1px solid var(--line);
  }

  .lesson-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--line);
  }

  .lesson-row:last-child { border-bottom: 0; }

  .student-lesson-link {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 0;
    border-bottom: 1px solid var(--line);
    background: transparent;
    color: var(--text);
  }

  .student-lesson-link:hover { background: rgba(37, 217, 232, 0.08); }
  .student-lesson-link small { display: block; color: var(--muted); }

  .lesson-order {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    border-radius: 50%;
    background: rgba(37, 217, 232, 0.12);
    color: var(--gold);
    font-weight: 700;
  }

  .empty-state {
    padding: 36px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--line-strong);
    border-radius: 18px;
    background: rgba(8, 27, 55, 0.42);
  }

  .embed-preview,
  .responsive-embed {
    width: 100%;
    overflow: hidden;
    padding: 16px;
    background: rgba(2, 10, 27, 0.86);
    border: 1px solid var(--line);
    border-radius: 16px;
  }

  .responsive-embed iframe,
  .embed-preview iframe {
    width: 100% !important;
    min-height: 480px;
    border: 0;
  }

  .preview-module { padding: 20px; margin-bottom: 18px; }
  .preview-lesson { padding: 16px 0; border-top: 1px solid var(--line); }

  .modal-content,
  .modal-content.bg-dark {
    color: var(--text) !important;
    background: linear-gradient(155deg, rgba(10, 31, 62, 0.98), rgba(3, 13, 33, 0.99)) !important;
    border: 1px solid var(--line-strong);
    border-radius: 22px;
    box-shadow: 0 30px 90px rgba(0, 4, 18, 0.65);
  }
  .modal-header, .modal-footer { border-color: var(--line) !important; }
  .modal-backdrop.show { opacity: 0.72; }

  .admin-filter { max-width: 240px; }

  .report-card {
    width: 100%;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 10px;
    padding: 24px;
    color: var(--text);
    text-align: left;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    transition: transform 160ms ease, border-color 160ms ease;
  }

  .report-card:hover { transform: translateY(-3px); border-color: var(--cyan); box-shadow: 0 20px 55px rgba(22,119,255,0.18); }
  .report-card i { color: var(--cyan); font-size: 1.8rem; filter: drop-shadow(0 0 10px rgba(37,217,232,0.35)); }
  .report-card small { color: var(--muted); }

  .dashboard-hero {
    min-height: 190px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 28px;
    padding: 32px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--line-strong);
    border-radius: 24px;
    background:
      radial-gradient(circle at 86% 12%, rgba(37,217,232,0.2), transparent 28%),
      linear-gradient(125deg, rgba(10,35,70,0.94), rgba(5,20,49,0.88));
    box-shadow: var(--shadow);
  }

  .dashboard-hero::after { content: ""; position: absolute; right: -80px; bottom: -130px; width: 330px; height: 330px; border: 1px solid rgba(37,217,232,0.12); border-radius: 50%; box-shadow: 0 0 0 45px rgba(22,119,255,0.04), 0 0 0 90px rgba(33,230,182,0.025); }
  .dashboard-hero > * { position: relative; z-index: 1; }
  .eyebrow { display: inline-block; margin-bottom: 10px; color: var(--turquoise); font-size: 0.74rem; font-weight: 800; letter-spacing: 0.18em; }

  .table thead th { padding-top: 14px; padding-bottom: 14px; border-bottom-color: var(--line-strong); }
  .table tbody tr { transition: background 150ms ease; }
  .table tbody tr:hover { background: rgba(37,217,232,0.045); }

  .app-footer {
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px 24px;
    color: var(--muted);
    font-size: 0.78rem;
    border-top: 1px solid var(--line);
    background: rgba(3, 12, 30, 0.72);
  }

  .text-bg-warning { color: #031026 !important; background: var(--cyan) !important; }
  .text-bg-success { background: #0fae8b !important; }
  .text-bg-secondary { background: #304761 !important; }
  .form-check-input:checked { background-color: var(--electric); border-color: var(--cyan); }
  .btn-close-white { filter: invert(82%) sepia(70%) saturate(647%) hue-rotate(127deg) brightness(97%); }

  .login-trust { display: flex; justify-content: center; gap: 18px; margin-top: 18px; color: var(--disabled); font-size: 0.72rem; }
  .login-trust i { color: var(--cyan); }

  .sidebar { position: relative; display: flex; flex-direction: column; min-height: 100vh; }
  .side-nav { flex: 1; }
  .sidebar-learning-card { margin: 16px; padding: 18px; display: flex; flex-direction: column; gap: 7px; border: 1px solid rgba(0,216,255,0.2); border-radius: 18px; background: linear-gradient(145deg, rgba(0,216,255,0.1), rgba(31,107,255,0.06)); }
  .sidebar-learning-card small { color: var(--muted); }
  .sidebar-learning-icon { width: 40px; height: 40px; display: grid; place-items: center; color: #031326; border-radius: 12px; background: var(--gradient); box-shadow: 0 0 24px rgba(0,216,255,0.28); }
  .sidebar-ai-button { margin-top: 7px; color: var(--cyan); font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .sidebar.collapsed .sidebar-learning-card { display: none; }

  .topbar { padding-inline: 20px; }
  .topbar-primary, .topbar-actions { display: flex; align-items: center; gap: 15px; min-width: 0; }
  .topbar-icon-button { width: 40px; height: 40px; display: grid; place-items: center; flex: 0 0 auto; padding: 0; color: var(--muted); border: 1px solid var(--line); background: rgba(255,255,255,0.025); }
  .topbar-icon-button:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0,216,255,0.08); }
  .main-navigation { display: flex; align-items: stretch; align-self: stretch; }
  .main-navigation button, .main-navigation a { display: flex; align-items: center; gap: 7px; padding: 0 11px; color: var(--muted); font-size: 0.78rem; text-decoration: none; border: 0; border-bottom: 2px solid transparent; background: transparent; white-space: nowrap; }
  .main-navigation button:hover, .main-navigation a:hover { color: var(--text); border-bottom-color: var(--cyan); }
  .main-navigation i { display: none; }
  .global-search { width: clamp(150px, 16vw, 250px); height: 40px; display: flex; align-items: center; gap: 9px; padding: 0 13px; border: 1px solid var(--line); border-radius: 12px; background: rgba(1,9,24,0.42); }
  .global-search i { color: var(--disabled); }
  .global-search input { min-width: 0; width: 100%; color: var(--text); border: 0; outline: 0; background: transparent; font-size: 0.8rem; }
  .global-search input::placeholder { color: var(--disabled); }
  .notification-button { position: relative; }
  .notification-button span { position: absolute; top: 8px; right: 8px; width: 7px; height: 7px; border: 2px solid #071426; border-radius: 50%; background: var(--gold); }
  .profile-chip { min-width: 155px; display: flex; align-items: center; gap: 9px; padding: 5px 9px 5px 5px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,255,255,0.025); }
  .profile-avatar { width: 34px; height: 34px; display: grid; place-items: center; flex: 0 0 auto; color: #041022; border: 1px solid rgba(255,255,255,0.12); border-radius: 11px; background: var(--gradient); }
  .profile-copy { min-width: 0; flex: 1; }
  .profile-copy div, .profile-copy small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-copy div { font-size: 0.78rem; }
  .profile-copy small { color: var(--muted); font-size: 0.65rem; }
  .profile-chevron { color: var(--disabled); font-size: 0.65rem; }

  .learning-hero { min-height: 420px; display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(300px, .85fr); overflow: hidden; position: relative; border: 1px solid var(--line-strong); border-radius: 26px; background: radial-gradient(circle at 82% 45%, rgba(0,216,255,0.2), transparent 26%), linear-gradient(115deg, #0b1e3b 0%, #0b2245 55%, #071426 100%); box-shadow: var(--shadow); }
  .learning-hero::before { content: ""; position: absolute; inset: 0; opacity: .22; background-image: linear-gradient(rgba(0,216,255,.09) 1px, transparent 1px), linear-gradient(90deg, rgba(0,216,255,.09) 1px, transparent 1px); background-size: 44px 44px; mask-image: linear-gradient(90deg, transparent, #000); }
  .learning-hero-content { align-self: center; position: relative; z-index: 2; padding: 54px; }
  .learning-hero h1 { max-width: 750px; margin: 18px 0 15px; font-size: clamp(2.2rem, 4vw, 4.2rem); line-height: 1.02; font-weight: 800; letter-spacing: -.045em; }
  .learning-hero p { max-width: 660px; color: var(--muted); font-size: 1.05rem; line-height: 1.7; }
  .hero-badges, .hero-meta, .hero-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .hero-badge { padding: 7px 11px; color: var(--muted); font-size: .68rem; font-weight: 800; letter-spacing: .08em; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.025); }
  .hero-badge-primary { color: #021021; border-color: transparent; background: var(--cyan); }
  .hero-meta { margin: 24px 0; color: #cad5e2; font-size: .8rem; }
  .hero-meta i { margin-right: 5px; color: var(--cyan); }
  .hero-visual { min-height: 360px; display: grid; place-items: center; position: relative; }
  .hero-brand-logo { width: min(260px, 65%); max-height: 100px; position: absolute; bottom: 40px; z-index: 2; }
  .ai-core { width: 118px; height: 118px; display: grid; place-items: center; position: relative; z-index: 3; color: #031326; font-size: 2.6rem; border-radius: 36px; background: var(--gradient); box-shadow: 0 0 80px rgba(0,216,255,.42); transform: rotate(-8deg); }
  .ai-core i { transform: rotate(8deg); }
  .ai-orbit { position: absolute; border: 1px solid rgba(0,216,255,.25); border-radius: 50%; }
  .ai-orbit-one { width: 250px; height: 250px; }
  .ai-orbit-two { width: 350px; height: 350px; border-style: dashed; opacity: .55; }
  .ai-node { width: 48px; height: 48px; display: grid; place-items: center; position: absolute; z-index: 2; color: var(--cyan); border: 1px solid var(--line-strong); border-radius: 15px; background: #0d2448; box-shadow: 0 0 25px rgba(0,216,255,.18); }
  .node-one { top: 22%; left: 17%; }.node-two { top: 17%; right: 20%; }.node-three { top: 52%; right: 12%; }

  .section-heading { display: flex; justify-content: space-between; align-items: end; gap: 18px; margin: 0 0 18px; }
  .section-heading h2 { margin: 1px 0 0; font-size: clamp(1.35rem, 2vw, 1.75rem); }
  .section-action { color: var(--cyan); border: 0; background: transparent; font-size: .82rem; font-weight: 700; }
  .section-action i { margin-left: 7px; }
  .period-filter { display: flex; gap: 4px; padding: 4px; border: 1px solid var(--line); border-radius: 12px; background: rgba(0,0,0,.12); }
  .period-filter button { padding: 7px 10px; color: var(--muted); font-size: .72rem; border: 0; border-radius: 8px; background: transparent; }
  .period-filter button.active { color: var(--text); background: #1a2542; }

  .learning-plan-grid { display: grid; grid-template-columns: 1.35fr .65fr; gap: 18px; }
  .current-plan-card { display: flex; align-items: center; gap: 28px; padding: 34px; border: 1px solid var(--line); border-radius: 24px; background: linear-gradient(135deg, rgba(7,25,51,.98), rgba(4,47,65,.92)); box-shadow: var(--shadow); }
  .current-plan-card.plan-card-paid { border-color: rgba(35,224,199,.55); background: linear-gradient(135deg, rgba(7,25,51,.98), rgba(11,76,116,.94)); }
  .current-plan-icon { display: grid; place-items: center; flex: 0 0 96px; width: 96px; height: 96px; border-radius: 28px; color: var(--cyan); font-size: 2.3rem; background: linear-gradient(145deg, rgba(35,224,199,.18), rgba(35,139,255,.22)); border: 1px solid rgba(35,224,199,.35); }
