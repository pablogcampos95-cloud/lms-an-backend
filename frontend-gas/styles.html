<style>
  :root {
    --bg: #071426;
    --bg-deep: #040d1c;
    --panel: rgba(26, 37, 66, 0.9);
    --panel-2: #0e1a35;
    --line: rgba(76, 201, 240, 0.18);
    --line-strong: rgba(76, 201, 240, 0.38);
    --text: #f5f7fa;
    --muted: #aab4c0;
    --disabled: #6f7a8a;
    --gold: #f5a400;
    --gold-dark: #b87900;
    --cyan: #00d8ff;
    --turquoise: #00d8ff;
    --electric: #1f6bff;
    --navy: #06152f;
    --gradient: linear-gradient(135deg, #00d8ff 0%, #1f6bff 100%);
    --shadow: 0 20px 50px rgba(0, 6, 24, 0.36);
  }

  * { box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    text-size-adjust: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 82% 8%, rgba(22, 119, 255, 0.16), transparent 28%),
      radial-gradient(circle at 16% 85%, rgba(33, 230, 182, 0.09), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: "Manrope", system-ui, sans-serif;
  }

  h1, h2, h3, h4, h5, h6, .fw-bold { font-family: "Space Grotesk", "Manrope", sans-serif; }
  h1, h2, h3 { text-wrap: balance; }
  p { text-wrap: pretty; }

  .login-screen {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      linear-gradient(rgba(3, 11, 28, 0.78), rgba(2, 7, 20, 0.92)),
      radial-gradient(circle at 15% 20%, rgba(33, 230, 182, 0.25), transparent 30%),
      radial-gradient(circle at 84% 24%, rgba(22, 119, 255, 0.28), transparent 32%),
      linear-gradient(145deg, #020714, #071c3d 58%, #020b1e);
  }

  .login-panel {
    width: min(100%, 470px);
    border: 1px solid var(--line-strong);
    background: linear-gradient(155deg, rgba(10, 31, 62, 0.94), rgba(4, 14, 35, 0.96));
    border-radius: 28px;
    padding: 38px;
    box-shadow: 0 30px 90px rgba(0, 4, 18, 0.62), 0 0 55px rgba(37, 217, 232, 0.08);
    backdrop-filter: blur(22px);
  }

  .brand-mark {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: #111;
    background: var(--gold);
    font-weight: 900;
    letter-spacing: 0;
  }

  .brand-logo { display: block; max-width: 100%; height: auto; object-fit: contain; }
  .brand-logo[src=""], .brand-logo:not([src]) { display: none; }
  .brand-logo-login { width: min(250px, 76%); max-height: 105px; margin: 0 auto; }
  .brand-logo-shell { width: 52px; height: 52px; padding: 6px; display: grid; place-items: center; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 15px; background: rgba(255,255,255,0.04); }
  .brand-logo-shell::after { content: "IA"; grid-area: 1 / 1; color: var(--cyan); font-family: "Space Grotesk"; font-weight: 800; }
  .brand-logo-shell .brand-logo { max-height: 38px; }
  .brand-logo-shell .brand-logo { grid-area: 1 / 1; position: relative; z-index: 1; }
  .brand-logo-header { width: 44px; max-height: 36px; }
  .dashboard-logo { width: min(260px, 30vw); max-height: 100px; }
  .section-logo { width: 74px; max-height: 54px; padding: 6px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); }
  .footer-logo { width: 100px; max-height: 36px; opacity: 0.8; }
  .login-tagline { color: var(--cyan); font-weight: 700; letter-spacing: -0.01em; }
  .brand-link { color: var(--cyan) !important; text-decoration: none; }

  .form-control,
  .form-select {
    background: rgba(2, 12, 31, 0.72);
    border-color: var(--line);
    color: var(--text);
    border-radius: 12px;
    min-height: 44px;
  }

  .form-control:focus,
  .form-select:focus {
    background: rgba(4, 19, 44, 0.92);
    border-color: var(--cyan);
    color: var(--text);
    box-shadow: 0 0 0 0.2rem rgba(37, 217, 232, 0.14);
  }

  .form-control::placeholder { color: #66809e; }
  .form-select option { background: #07172f; color: var(--text); }

  .btn-gold {
    background: var(--gradient);
    border-color: transparent;
    color: #021024;
    font-weight: 700;
    border-radius: 12px;
    box-shadow: 0 10px 26px rgba(22, 119, 255, 0.22);
  }

  .btn-gold:hover {
    background: linear-gradient(135deg, #50f3ce, #3ae4ef 44%, #398eff);
    border-color: transparent;
    color: #020b1c;
    transform: translateY(-1px);
  }

  .btn { border-radius: 11px; transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease; }
  .btn-outline-brand, .btn-outline-warning { color: var(--cyan); border-color: rgba(37, 217, 232, 0.55); }
  .btn-outline-brand:hover, .btn-outline-warning:hover { color: #031026; background: var(--cyan); border-color: var(--cyan); }
  .btn-outline-light { border-color: rgba(145, 168, 196, 0.42); color: #dcecff; }
  .btn-outline-light:hover { background: rgba(37, 217, 232, 0.1); color: var(--cyan); border-color: var(--cyan); }

  .public-catalog-screen {
    min-height: 100vh;
    background:
      radial-gradient(circle at 82% 8%, rgba(31,107,255,.22), transparent 28%),
      radial-gradient(circle at 12% 35%, rgba(0,216,255,.14), transparent 30%),
      linear-gradient(145deg, #020714 0%, #071426 46%, #03152d 100%);
  }
  .public-catalog-header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 28px;
    padding: 18px clamp(22px, 5vw, 72px);
    border-bottom: 1px solid var(--line);
    background: rgba(3, 11, 28, .84);
    backdrop-filter: blur(18px);
  }
  .public-brand { display:flex;align-items:center;gap:13px;color:var(--text);font-weight:900;text-decoration:none; }
  .public-brand img { width:48px;height:48px;object-fit:contain;border:1px solid var(--line);border-radius:15px;padding:5px;background:rgba(255,255,255,.04); }
  .public-nav { display:flex;gap:26px;align-items:center; }
  .public-nav a { color:#c8d8ee;text-decoration:none;font-weight:700;font-size:.92rem; }
  .public-nav a:hover { color:var(--cyan); }
  .public-actions { display:flex;align-items:center;gap:12px; }
  .public-search { display:flex;align-items:center;gap:10px;min-width:min(380px,30vw);min-height:48px;padding:0 15px;border:1px solid var(--line);border-radius:14px;background:rgba(2,12,31,.75);color:var(--muted); }
  .public-search input { width:100%;border:0;outline:0;background:transparent;color:var(--text); }
  .public-search input::placeholder { color:#7f92ac; }
  .btn-public-login { min-height:48px;padding-inline:24px;color:#031326;background:var(--gradient);border:0;font-weight:900; }
  .btn-public-free { min-height:48px;padding-inline:22px;color:#031326;background:linear-gradient(135deg,#22f0d0,#00d8ff);border:0;font-weight:900;box-shadow:0 12px 30px rgba(0,216,255,.18); }
  .btn-public-free:hover { color:#031326;filter:brightness(1.06);transform:translateY(-1px); }
  .public-catalog-main { padding:42px clamp(22px, 5vw, 72px) 80px; }
  .public-hero {
    display:grid;
    grid-template-columns:minmax(0,1.3fr) minmax(300px,.7fr);
    gap:34px;
    align-items:stretch;
    max-width:1480px;
    margin:0 auto 34px;
    padding:clamp(34px,5vw,72px);
    border:1px solid var(--line-strong);
    border-radius:34px;
    background:linear-gradient(135deg,rgba(8,30,65,.96),rgba(2,11,30,.9)), radial-gradient(circle at 83% 20%,rgba(0,216,255,.24),transparent 28%);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .public-kicker { color:var(--cyan);font-weight:900;letter-spacing:.18em;font-size:.76rem; }
  .public-hero h1 { max-width:880px;margin:18px 0;font-size:clamp(2.25rem,4.35vw,4.85rem);line-height:1.02;letter-spacing:-.05em; }
  .public-hero p { max-width:700px;color:#b9cae0;font-size:1.08rem;line-height:1.7; }
  .public-hero-actions { display:flex;flex-wrap:wrap;gap:14px;margin-top:30px; }
  .public-hero-card { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:320px;border:1px solid var(--line);border-radius:30px;background:radial-gradient(circle,rgba(0,216,255,.18),transparent 46%),rgba(2,12,31,.65);text-align:center; }
  .public-ai-core { width:112px;height:112px;border-radius:32px; }
  .public-hero-card strong { font-size:1.45rem; }
  .public-hero-card span { color:var(--muted); }
  .public-ai-core img { width:100%;height:100%;object-fit:contain;border-radius:inherit; }
  .public-benefits { max-width:1480px;margin:0 auto 42px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px; }
  .public-benefits article { display:grid;gap:7px;padding:22px;border:1px solid var(--line);border-radius:22px;background:rgba(10,31,62,.68); }
  .public-benefits i { color:var(--cyan);font-size:1.35rem; }
  .public-benefits span { color:var(--muted);font-size:.9rem; }
  .public-courses-section { max-width:1480px;margin:0 auto; }
  .public-section-heading { display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:22px; }
  .public-section-heading h2 { margin:6px 0 0;font-size:clamp(1.7rem,2.55vw,2.65rem); }
  .public-section-heading .form-select { max-width:280px; }
  .public-courses-grid { display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px; }
  .public-course-card { overflow:hidden;border:1px solid var(--line);border-radius:26px;background:linear-gradient(155deg,rgba(13,31,62,.98),rgba(4,14,35,.98));box-shadow:var(--shadow);transition:transform .18s ease,border-color .18s ease; }
  .public-course-card.has-course-cover { background:linear-gradient(180deg,rgba(4,12,28,.2),rgba(4,12,28,.98) 58%),var(--public-course-cover) center center/cover no-repeat; }
  .public-course-card:hover { transform:translateY(-5px);border-color:var(--cyan); }
  .public-course-cover { position:relative;height:220px;overflow:hidden;background:#0b2245; }
  .public-course-card.has-course-cover .public-course-cover { background:linear-gradient(180deg,rgba(3,10,24,.02),rgba(3,10,24,.72)),var(--public-course-cover) center center/cover no-repeat; }
  .public-course-cover img { width:100%;height:100%;object-fit:cover;object-position:center;transition:transform .28s ease; }
  .public-course-card:hover .public-course-cover { background-size:cover; }
  .public-course-card:hover .public-course-cover img { transform:scale(1.04); }
  .public-course-cover::after { content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(3,10,24,.05),rgba(3,10,24,.72)); }
  .public-course-cover span { position:absolute;top:16px;left:16px;z-index:1;padding:8px 11px;border-radius:999px;background:var(--gradient);color:#021024;font-size:.72rem;font-weight:900; }
  .public-course-placeholder { height:100%;display:grid;place-items:center;color:var(--cyan);font-size:3.2rem;background:radial-gradient(circle,rgba(0,216,255,.2),transparent 45%),#0b2245; }
  .public-course-body { padding:24px; }
  .public-course-category { color:var(--cyan);font-weight:900;letter-spacing:.08em;text-transform:uppercase;font-size:.68rem; }
  .public-course-body h3 { min-height:58px;margin:10px 0;font-size:1.25rem;line-height:1.3; }
  .public-course-body p { min-height:54px;color:var(--muted);font-size:.88rem;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
  .public-course-meta { display:flex;gap:14px;color:#91a8c4;font-size:.78rem;margin:18px 0; }
  .public-course-meta i { color:var(--cyan);margin-right:6px; }
  .public-course-button { width:100%;color:#031326;background:var(--gradient);border:0;font-weight:900; }
  .public-course-button-secondary { color:#d8e8ff;background:rgba(5,24,50,.72);border:1px solid var(--line-strong); }
  .public-course-button-secondary:hover { color:#031326;background:var(--cyan); }
  .public-empty,.public-loading { grid-column:1/-1;display:grid;place-items:center;gap:10px;min-height:160px;border:1px dashed var(--line-strong);border-radius:24px;color:var(--muted);text-align:center; }
  .public-empty i { color:var(--cyan);font-size:2rem; }
  .public-register-modal { border:1px solid var(--line-strong);border-radius:24px;background:linear-gradient(155deg,rgba(9,26,55,.98),rgba(2,10,26,.98));color:var(--text);box-shadow:var(--shadow); }
  .public-register-modal .modal-header,.public-register-modal .modal-footer { border-color:var(--line); }
  .public-register-modal .form-control { min-height:46px;border-color:var(--line);background:rgba(2,12,31,.86);color:var(--text); }
  .public-register-modal .form-control:focus { border-color:var(--cyan);box-shadow:0 0 0 .18rem rgba(0,216,255,.16); }
  .public-register-divider { display:flex;align-items:center;gap:14px;margin:22px 0 14px;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.12em; }
  .public-register-divider::before,.public-register-divider::after { content:"";height:1px;flex:1;background:var(--line); }
  .google-register-button { display:grid;place-items:center;min-height:44px; }
  .home-config-panel { border-color:rgba(0,216,255,.24); }
  .home-switch-grid { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px; }
  .home-switch-grid label { padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(2,12,31,.45); }
  .home-sections-editor { display:grid;gap:14px; }
  .home-section-editor { padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(2,12,31,.52); }
  .home-section-row { display:grid;grid-template-columns:80px 170px 1fr auto auto;gap:10px;align-items:center; }
  .home-section-visible { display:flex;align-items:center;gap:8px;white-space:nowrap;color:var(--muted); }
  .home-course-pick-list { display:grid;gap:9px;max-height:360px;overflow:auto;padding-right:4px; }
  .home-course-pick-list label { display:grid;grid-template-columns:auto 1fr;column-gap:10px;row-gap:2px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(2,12,31,.45); }
  .home-course-pick-list small { grid-column:2;color:var(--muted); }
  .home-admin-preview { display:grid;gap:12px; }
  .home-preview-hero { display:grid;gap:8px;padding:18px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(135deg,rgba(8,30,65,.96),rgba(2,11,30,.94)); }
  .home-preview-hero span { color:var(--cyan);font-size:.68rem;font-weight:900;letter-spacing:.16em; }
  .home-preview-hero strong { font-family:"Space Grotesk";font-size:1.25rem;line-height:1.2; }
  .home-preview-hero p { margin:0;color:var(--muted);font-size:.85rem;line-height:1.5; }
  .home-preview-list { display:grid;gap:8px;color:var(--muted); }

  .app-shell {
    min-height: 100vh;
    display: flex;
  }

  .sidebar {
    width: 280px;
    background: linear-gradient(180deg, rgba(6, 21, 47, 0.98), rgba(3, 11, 28, 0.99));
    border-right: 1px solid var(--line);
    transition: width 180ms ease;
    box-shadow: 18px 0 48px rgba(0, 5, 20, 0.2);
  }

  .sidebar.collapsed {
    width: 82px;
  }

  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .brand-copy {
    display: none;
  }

  .sidebar-header {
    min-height: 84px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }

  .side-link {
    width: 100%;
    border: 0;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--muted);
    background: transparent;
    padding: 13px 18px;
    text-align: left;
    transition: background 160ms ease, color 160ms ease;
    border-left: 3px solid transparent;
  }

  .side-link:hover,
  .side-link.active {
    background: linear-gradient(90deg, rgba(37, 217, 232, 0.15), rgba(22, 119, 255, 0.05));
    color: var(--text);
    border-left-color: var(--cyan);
  }

  .side-link.active i { color: var(--cyan); filter: drop-shadow(0 0 8px rgba(37, 217, 232, 0.5)); }

  .side-link i {
    width: 22px;
    text-align: center;
  }

  .workspace {
    min-width: 0;
    flex: 1;
    background: transparent;
  }

  .topbar {
    min-height: 84px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(4, 14, 35, 0.84);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(18px);
  }

  .content-wrap {
    padding: 28px;
    min-height: calc(100vh - 146px);
  }

  .view { display: none; }
  .view.active { display: block; }

  .metric-card,
  .data-panel,
  .course-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .metric-card {
    padding: 21px;
    position: relative;
    overflow: hidden;
  }

  .metric-card::after { content: ""; position: absolute; inset: auto -24px -34px auto; width: 95px; height: 95px; border-radius: 50%; background: radial-gradient(circle, rgba(37,217,232,0.16), transparent 68%); }

  .metric-label {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .metric-value {
    font-size: 1.9rem;
    font-weight: 800;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .data-panel {
    padding: 24px;
  }

  .table {
    --bs-table-bg: transparent;
    --bs-table-color: var(--text);
    --bs-table-border-color: var(--line);
  }

  .table thead th {
    color: var(--muted);
    font-weight: 600;
  }

  .badge-soft {
    background: rgba(37, 217, 232, 0.1);
    color: var(--cyan);
    border: 1px solid rgba(37, 217, 232, 0.28);
  }

  .skeleton {
    min-height: 18px;
    border-radius: 6px;
    background: linear-gradient(90deg, #0b2143, #123966, #0b2143);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    to { background-position-x: -200%; }
  }

  .course-cover,
  .preview-cover {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    object-position: center center;
    border-radius: 10px;
    border: 1px solid var(--line);
  }

  .module-editor-card,
  .preview-module {
    overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }

  .module-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px;
    border-bottom: 1px solid var(--line);
  }

  .lesson-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--line);
  }

  .lesson-row:last-child { border-bottom: 0; }

  .evaluation-sequence-row {
    background: linear-gradient(90deg, rgba(0, 212, 255, .08), rgba(24, 119, 242, .03));
    border-left: 3px solid var(--cyan);
  }

  .forum-sequence-row {
    background: linear-gradient(90deg, rgba(53, 209, 173, .09), rgba(0, 153, 255, .03));
    border-left: 3px solid #35d1ad;
  }

  .student-lesson-link {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 0;
    border-bottom: 1px solid var(--line);
    background: transparent;
    color: var(--text);
  }

  .student-lesson-link:hover { background: rgba(37, 217, 232, 0.08); }
  .student-lesson-link small { display: block; color: var(--muted); }

  .lesson-order {
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    border-radius: 50%;
    background: rgba(37, 217, 232, 0.12);
    color: var(--gold);
    font-weight: 700;
  }

  .empty-state {
    padding: 36px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--line-strong);
    border-radius: 18px;
    background: rgba(8, 27, 55, 0.42);
  }

  .embed-preview,
  .responsive-embed {
    width: 100%;
    max-width: 100%;
    overflow: auto;
    padding: 16px;
    background: rgba(2, 10, 27, 0.86);
    border: 1px solid var(--line);
    border-radius: 16px;
    overscroll-behavior: contain;
  }

  .responsive-embed iframe,
  .embed-preview iframe {
    display: block;
    width: 100% !important;
    max-width: 100% !important;
    min-height: clamp(520px, 72vh, 860px);
    height: clamp(520px, 72vh, 860px) !important;
    border: 0;
    border-radius: 12px;
    background: #fff;
  }

  .responsive-embed img,
  .embed-preview img,
  .lesson-content img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
  }

  .responsive-embed table,
  .lesson-content table {
    width: 100%;
    max-width: 100%;
  }

  .preview-module { padding: 20px; margin-bottom: 18px; }
  .preview-lesson { padding: 16px 0; border-top: 1px solid var(--line); }

  /* IA Learning visual refresh published build */
  :root {
    --bg: #050b14;
    --bg-deep: #02060d;
    --panel: rgba(14, 20, 31, 0.94);
    --panel-2: #111923;
    --line: rgba(0, 216, 255, 0.16);
    --line-strong: rgba(0, 216, 255, 0.34);
    --turquoise: #23f7c8;
    --mint: #24f2a3;
    --gradient: linear-gradient(135deg, #23f7c8 0%, #00d8ff 48%, #1f6bff 100%);
    --shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
  }

  body {
    background:
      radial-gradient(circle at 84% -6%, rgba(35, 242, 163, 0.16), transparent 30%),
      radial-gradient(circle at 16% 88%, rgba(0, 216, 255, 0.09), transparent 32%),
      linear-gradient(180deg, #07101b 0%, var(--bg) 40%, #03070d 100%);
  }

  .public-catalog-screen,
  .app-shell {
    width: 100%;
    min-height: 100vh;
    background:
      radial-gradient(circle at 100% 0%, rgba(35,242,163,.09), transparent 32%),
      radial-gradient(circle at 0% 100%, rgba(0,216,255,.08), transparent 30%),
      linear-gradient(180deg, #050b14 0%, #040a12 100%);
  }

  .public-catalog-header,
  .sidebar,
  .topbar,
  .app-footer {
    background: rgba(3, 8, 15, .78);
    backdrop-filter: blur(18px);
  }

  .content-wrap,
  .public-catalog-main {
    max-width: 1480px;
    margin-inline: auto;
  }

  .public-hero,
  .learning-hero {
    min-height: clamp(420px, 42vw, 560px);
    border-color: rgba(35,242,163,.26);
    border-radius: 30px;
    background:
      radial-gradient(circle at 82% 36%, rgba(35,242,163,.13), transparent 29%),
      radial-gradient(circle at 58% 0%, rgba(0,216,255,.08), transparent 35%),
      linear-gradient(115deg, rgba(7,16,28,.98), rgba(9,20,36,.96) 52%, rgba(4,10,17,.98)) !important;
    box-shadow: 0 34px 90px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.035);
  }

  .learning-hero.has-course-cover {
    background-size: cover !important;
    background-position: center center !important;
  }

  .public-hero h1,
  .learning-hero h1 {
    max-width: 860px;
    font-size: clamp(2.45rem, 5.15vw, 5.3rem);
    line-height: .98;
    letter-spacing: -.065em;
  }

  .public-hero p,
  .learning-hero p {
    max-width: 700px;
    color: #c8d4df;
    font-size: clamp(1rem, 1.3vw, 1.2rem);
  }

  .hero-badge-primary,
  .btn-gold,
  .student-course-primary,
  .achievement-button,
  .evaluation-tabs button.active {
    color: #02110f !important;
    background: linear-gradient(135deg, var(--mint), var(--cyan), var(--electric)) !important;
    box-shadow: 0 16px 38px rgba(0,216,255,.22);
  }

  .data-panel,
  .profile-progress-card,
  .achievement-card,
  .current-plan-card,
  .student-courses-heading,
  .page-intro,
  .evaluation-page-heading,
  .forum-workspace,
  .integrated-forum,
  .public-category-card {
    border-color: rgba(0,216,255,.18);
    background:
      radial-gradient(circle at 100% 0%, rgba(35,242,163,.08), transparent 32%),
      linear-gradient(135deg, rgba(13,24,38,.94), rgba(7,15,26,.94));
  }

  .public-course-grid,
  .course-showcase-grid {
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  }

  .student-courses-grid {
    grid-template-columns: repeat(auto-fill, minmax(320px, 440px));
  }

  .public-course-card,
  .visual-course-card,
  .student-catalog-card {
    border-radius: 18px;
    background: #101720;
    box-shadow: 0 22px 54px rgba(0,0,0,.34);

  .public-course-card:hover,

  .student-catalog-card:hover,

  .public-course-cover,

  .learning-path-card {
    border-radius: 16px;
    background:

  }

  .recommendation-icon,
  .evaluation-card-icon,
  .evaluation-type-icon,
  .page-intro-icon,
  .certificate-icon {
    color: var(--mint);
    background: rgba(35,242,163,.1);
    border: 1px solid rgba(35,242,163,.18);
  }

  .student-player-layout {
    min-height: clamp(680px, 82vh, 980px);
  }

  .student-player-sidebar {
    background: linear-gradient(180deg, rgba(7,17,31,.98), rgba(4,10,17,.98));
  }

  .student-player-content {

  }

  #view-student-course-player .student-player-layout.outline-collapsed {
    grid-template-columns: minmax(0, 1fr);
  }

  #view-student-course-player .student-player-layout.outline-collapsed .student-player-sidebar {
    display: none;
  }

  #view-student-course-player .student-player-layout.outline-open {

  }

  #view-student-course-player .student-player-layout.outline-open .student-player-sidebar {
    display: block;
    position: relative;
    inset: auto;
    z-index: 1;

    border-bottom: 0;
    box-shadow: none;
  }

  .responsive-embed,

    width: 100%;
    max-width: 100%;
    min-height: min(78vh, 760px);
    overflow: auto;
    overscroll-behavior: contain;
