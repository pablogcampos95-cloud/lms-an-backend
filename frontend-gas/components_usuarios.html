<section id="view-usuarios" class="view" data-title="Gestion de usuarios">
  <div class="data-panel">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
      <div>
        <h2 class="h5 mb-1">Usuarios</h2>
        <small class="text-secondary">Administracion de personas, accesos y roles</small>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <button id="exportUsersCsv" class="btn btn-outline-light btn-sm" type="button">
          <i class="fa-solid fa-file-excel me-1"></i>Excel
        </button>
        <button id="exportUsersPdf" class="btn btn-outline-light btn-sm" type="button">
          <i class="fa-solid fa-file-pdf me-1"></i>PDF
        </button>
        <button id="openUserModal" class="btn btn-gold btn-sm" type="button">
          <i class="fa-solid fa-user-plus me-1"></i>Crear usuario
        </button>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-md-7">
        <input id="userSearch" class="form-control" placeholder="Buscar por DNI, nombre, correo, usuario o cargo">
      </div>
      <div class="col-md-3">
        <select id="userStatusFilter" class="form-select">
          <option value="">Todos los estados</option>
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
        </select>
      </div>
      <div class="col-md-2">
        <button id="refreshUsers" class="btn btn-outline-warning w-100" type="button">
          <i class="fa-solid fa-rotate"></i>
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>DNI</th>
            <th>Nombres</th>
            <th>Correo</th>
            <th>Cargo</th>
            <th>Campana</th>
            <th>Estado</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content bg-dark text-light border-secondary">
        <form id="userForm">
          <div class="modal-header border-secondary">
            <h3 id="userModalTitle" class="modal-title h5">Crear usuario</h3>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input id="userId" type="hidden">
            <div class="row g-3">
              <div class="col-md-3"><label class="form-label">DNI</label><input id="fieldDNI" class="form-control" required></div>
              <div class="col-md-5"><label class="form-label">Nombres</label><input id="fieldNombres" class="form-control" required></div>
              <div class="col-md-4"><label class="form-label">Correo</label><input id="fieldCorreo" class="form-control" type="email" required></div>
              <div class="col-md-4"><label class="form-label">Cargo</label><input id="fieldCargo" class="form-control" required></div>
              <div class="col-md-4"><label class="form-label">Campana</label><input id="fieldCampana" class="form-control"></div>
              <div class="col-md-4"><label class="form-label">Supervisor</label><input id="fieldSupervisor" class="form-control"></div>
              <div class="col-md-3"><label class="form-label">Estado</label><select id="fieldEstado" class="form-select"><option>Activo</option><option>Inactivo</option></select></div>
              <div class="col-md-3"><label class="form-label">Fecha ingreso</label><input id="fieldFechaIngreso" class="form-control" type="date"></div>
              <div class="col-md-3"><label class="form-label">Usuario</label><input id="fieldUsuario" class="form-control" required></div>
              <div class="col-md-3"><label class="form-label">Rol</label><select id="fieldRol" class="form-select" required></select></div>
              <div class="col-md-4"><label class="form-label">Contrasena</label><input id="fieldPassword" class="form-control" type="password" minlength="4"></div>
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-gold" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
