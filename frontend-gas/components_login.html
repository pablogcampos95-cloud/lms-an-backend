<section id="loginScreen" class="login-screen">
  <div class="login-panel">
    <div class="login-brand text-center mb-4">
      <img class="brand-logo brand-logo-login" src="https://drive.google.com/thumbnail?id=1psVpvO0Rhq8JyKfxUDem6dxzm7Qeci1R&sz=w1200" alt="IA Learning Solutions" onerror="this.style.display='none'">
      <h1 id="loginContentTitle" class="h3 mt-4 mb-2 fw-bold"></h1>
      <p id="loginContentSubtitle" class="login-tagline mb-0"></p>
      <div class="login-trust">
        <span><i class="fa-solid fa-shield-halved"></i> <span id="loginContentBadgeOne"></span></span>
        <span><i class="fa-solid fa-lock"></i> <span id="loginContentBadgeTwo"></span></span>
      </div>
    </div>

    <form id="loginForm" class="vstack gap-3">
      <div>
        <label class="form-label" for="loginUsuario">Usuario</label>
        <input id="loginUsuario" class="form-control form-control-lg" value="Admin" autocomplete="username" required>
      </div>
      <div>
        <label class="form-label" for="loginPassword">Contrasena</label>
        <input id="loginPassword" class="form-control form-control-lg" type="password" value="Admin" autocomplete="current-password" required>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <label class="form-check-label small text-secondary">
          <input id="rememberMe" class="form-check-input me-1" type="checkbox" checked>
          Recordarme
        </label>
        <button class="btn btn-link brand-link p-0 small" type="button">Recuperar contrasena</button>
      </div>
      <button id="loginButton" class="btn btn-gold btn-lg w-100" type="submit">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar
      </button>
    </form>
  </div>
</section>
