<script>
const EvaluacionesService = {
  async listar(params = {}) { const query = new URLSearchParams(Object.entries(params).filter(([, value]) => value)).toString(); return (await ApiService.request(`/api/evaluaciones${query ? `?${query}` : ''}`)).data || []; },
  async obtener(id) { return (await ApiService.request(`/api/evaluaciones/${id}`)).data; },
  async crear(payload) { return (await ApiService.request('/api/evaluaciones', { method: 'POST', body: JSON.stringify(payload) })).data; },
  async actualizar(id, payload) { return (await ApiService.request(`/api/evaluaciones/${id}`, { method: 'PUT', body: JSON.stringify(payload) })).data; },
  async ordenar(id, direction) { return (await ApiService.request(`/api/evaluaciones/${id}/orden`, { method: 'PATCH', body: JSON.stringify({ direction }) })).data; },
  async eliminar(id) { return (await ApiService.request(`/api/evaluaciones/${id}`, { method: 'DELETE' })).data; },
  async duplicar(id) { return (await ApiService.request(`/api/evaluaciones/${id}/duplicar`, { method: 'POST' })).data; },
  async iniciar(id) { return (await ApiService.request(`/api/evaluaciones/${id}/intentos`, { method: 'POST' })).data; },
  async enviar(id, intentoId, respuestas) { return (await ApiService.request(`/api/evaluaciones/${id}/intentos/${intentoId}/enviar`, { method: 'POST', body: JSON.stringify({ respuestas }) })).data; },
  async resultados(id) { return (await ApiService.request(`/api/evaluaciones/${id}/resultados`)).data; },
  async calificarRespuesta(id, payload) { return (await ApiService.request(`/api/evaluaciones/respuestas/${id}/calificar`, { method: 'PATCH', body: JSON.stringify(payload) })).data; },
  async listarForos() { return (await ApiService.request('/api/evaluaciones/foros')).data || []; },
  async crearForo(payload) { return (await ApiService.request('/api/evaluaciones/foros', { method: 'POST', body: JSON.stringify(payload) })).data; },
  async actualizarForo(id, payload) { return (await ApiService.request(`/api/evaluaciones/foros/${id}`, { method: 'PUT', body: JSON.stringify(payload) })).data; },
  async subirArchivoForo(id, file) { const form = new FormData(); form.append('archivo', file); return (await ApiService.upload(`/api/evaluaciones/foros/${id}/archivo`, form)).data; },
  async eliminarForo(id) { return (await ApiService.request(`/api/evaluaciones/foros/${id}`, { method: 'DELETE' })).data; },
  async responderForo(id, payload) { return (await ApiService.request(`/api/evaluaciones/foros/${id}/responder`, { method: 'POST', body: JSON.stringify(payload) })).data; },
  async resultadosForo(id) { return (await ApiService.request(`/api/evaluaciones/foros/${id}/resultados`)).data; },
  async calificarForo(id, payload) { return (await ApiService.request(`/api/evaluaciones/foros/respuestas/${id}/calificar`, { method: 'PATCH', body: JSON.stringify(payload) })).data; },
};
</script>
