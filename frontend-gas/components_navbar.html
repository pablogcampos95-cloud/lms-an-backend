      <i class="fa-solid fa-bars"></i>
    </button>
    <img class="brand-logo brand-logo-header" src="https://drive.google.com/uc?export=view&id=1vBdo2lvVSSf40YUT8p3JiFIoUGE6hqkV" alt="IA Learning Solutions">
    <div>
      <div id="viewTitle" class="fw-bold">Dashboard</div>
